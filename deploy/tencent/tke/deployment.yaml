# =============================================================================
# 腾讯云 TKE 容器服务 - Kubernetes Deployment
# 千川SDK管理平台
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qianchuan-backend
  namespace: qianchuan
  labels:
    app: qianchuan
    component: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qianchuan
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: qianchuan
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: qianchuan-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
        - name: backend
          image: ccr.ccs.tencentyun.com/qianchuan/backend:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: qianchuan-config
            - secretRef:
                name: qianchuan-secrets
          
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: tmp
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: qianchuan
                    component: backend
                topologyKey: kubernetes.io/hostname
      
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: qianchuan
              component: backend
      
      terminationGracePeriodSeconds: 30

---
# 前端 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qianchuan-frontend
  namespace: qianchuan
  labels:
    app: qianchuan
    component: frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qianchuan
      component: frontend
  template:
    metadata:
      labels:
        app: qianchuan
        component: frontend
        version: v1
    spec:
      containers:
        - name: nginx
          image: ccr.ccs.tencentyun.com/qianchuan/frontend:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      
      volumes:
        - name: nginx-config
          configMap:
            name: qianchuan-nginx-config
