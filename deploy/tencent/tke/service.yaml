# =============================================================================
# 腾讯云 TKE 容器服务 - Kubernetes Service & Ingress
# 千川SDK管理平台
# =============================================================================

# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: qianchuan
  labels:
    app: qianchuan

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qianchuan-sa
  namespace: qianchuan

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: qianchuan-backend
  namespace: qianchuan
  labels:
    app: qianchuan
    component: backend
spec:
  type: ClusterIP
  selector:
    app: qianchuan
    component: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: qianchuan-frontend
  namespace: qianchuan
  labels:
    app: qianchuan
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: qianchuan
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# Ingress (使用腾讯云 CLB Ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qianchuan-ingress
  namespace: qianchuan
  annotations:
    # 腾讯云 CLB Ingress Controller 注解
    kubernetes.io/ingress.class: "qcloud"
    # 使用已有 CLB（可选）
    # kubernetes.io/ingress.existLbId: "lb-xxxxxxxx"
    # HTTPS 证书（腾讯云证书 ID）
    # kubernetes.io/ingress.http-rules: ""
    # kubernetes.io/ingress.https-rules: ""
    ingress.cloud.tencent.com/direct-access: "false"
    # 开启 Gzip
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: qianchuan.example.com  # 替换为实际域名
      http:
        paths:
          # API 路由
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: qianchuan-backend
                port:
                  number: 8080
          # 健康检查
          - path: /health
            pathType: Exact
            backend:
              service:
                name: qianchuan-backend
                port:
                  number: 8080
          # 前端路由
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qianchuan-frontend
                port:
                  number: 80
  # TLS 配置（可选）
  # tls:
  #   - hosts:
  #       - qianchuan.example.com
  #     secretName: qianchuan-tls

---
# HorizontalPodAutoscaler (HPA)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qianchuan-backend-hpa
  namespace: qianchuan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qianchuan-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qianchuan-backend-pdb
  namespace: qianchuan
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: qianchuan
      component: backend
