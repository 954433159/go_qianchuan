<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>达人直播列表 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="qc-card mb-6">
      <div class="grid grid-cols-4 gap-4">
        <input type="text" placeholder="搜索达人昵称" class="qc-input">
        <select class="qc-input">
          <option>全部状态</option>
          <option>直播中</option>
          <option>已结束</option>
          <option>预告中</option>
        </select>
        <input type="date" class="qc-input">
        <button class="qc-btn qc-btn-primary">搜索</button>
      </div>
    </div>

    <div class="space-y-4">
      <div class="qc-card">
        <div class="flex items-center gap-4">
          <img src="https://placehold.co/80x80/FF6B6B/FFF?text=LIVE" class="w-20 h-20 rounded-lg">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-2">
              <h3 class="font-semibold text-gray-900">美妆达人小王的直播间</h3>
              <span class="qc-badge qc-badge-success">🔴 直播中</span>
            </div>
            <div class="grid grid-cols-4 gap-6">
              <div>
                <div class="text-sm text-gray-600">观看人数</div>
                <div class="font-medium text-blue-600">12.5万</div>
              </div>
              <div>
                <div class="text-sm text-gray-600">开播时间</div>
                <div class="font-medium">2025-06-15 19:30</div>
              </div>
              <div>
                <div class="text-sm text-gray-600">累计销售</div>
                <div class="font-medium qc-text-gradient">¥45.8万</div>
              </div>
              <div>
                <div class="text-sm text-gray-600">商品数</div>
                <div class="font-medium">23件</div>
              </div>
            </div>
          </div>
          <button class="qc-btn qc-btn-primary">查看详情</button>
        </div>
      </div>

      <div class="qc-card">
        <div class="flex items-center gap-4">
          <img src="https://placehold.co/80x80/4ECDC4/FFF?text=END" class="w-20 h-20 rounded-lg">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-2">
              <h3 class="font-semibold text-gray-900">护肤专家Lisa的直播间</h3>
              <span class="qc-badge">已结束</span>
            </div>
            <div class="grid grid-cols-4 gap-6">
              <div>
                <div class="text-sm text-gray-600">总观看</div>
                <div class="font-medium text-blue-600">8.3万</div>
              </div>
              <div>
                <div class="text-sm text-gray-600">直播时长</div>
                <div class="font-medium">3小时15分</div>
              </div>
              <div>
                <div class="text-sm text-gray-600">总销售</div>
                <div class="font-medium qc-text-gradient">¥32.6万</div>
              </div>
              <div>
                <div class="text-sm text-gray-600">商品数</div>
                <div class="font-medium">18件</div>
              </div>
            </div>
          </div>
          <button class="qc-btn qc-btn-secondary">查看回放</button>
        </div>
      </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  <script src="nav-component.js"></script>
</body>
</html>
