<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新地域定向 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-4xl mx-auto px-4 py-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-8">🗺️ 更新地域定向</h2>

    <div class="qc-card mb-6">
      <h3 class="font-semibold text-gray-900 mb-4">地域选择</h3>
      <div class="space-y-4">
        <div class="flex gap-4">
          <button onclick="selectAll()" class="qc-btn qc-btn-secondary text-sm">全选</button>
          <button onclick="clearAll()" class="qc-btn qc-btn-secondary text-sm">清空</button>
          <button onclick="selectHot()" class="qc-btn qc-btn-secondary text-sm">热门城市</button>
        </div>

        <div class="grid grid-cols-4 gap-3">
          <label class="flex items-center p-3 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">北京</span>
          </label>
          <label class="flex items-center p-3 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">上海</span>
          </label>
          <label class="flex items-center p-3 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">广州</span>
          </label>
          <label class="flex items-center p-3 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">深圳</span>
          </label>
          <label class="flex items-center p-3 border-2 border-gray-300 rounded-lg cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">杭州</span>
          </label>
          <label class="flex items-center p-3 border-2 border-gray-300 rounded-lg cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">成都</span>
          </label>
          <label class="flex items-center p-3 border-2 border-gray-300 rounded-lg cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">武汉</span>
          </label>
          <label class="flex items-center p-3 border-2 border-gray-300 rounded-lg cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span class="ml-2 text-sm font-medium">西安</span>
          </label>
        </div>

        <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
          <div class="text-sm text-blue-900">已选择 <strong>4</strong> 个城市</div>
        </div>
      </div>
    </div>

    <div class="flex gap-3">
      <button onclick="window.history.back()" class="flex-1 qc-btn qc-btn-secondary">取消</button>
      <button onclick="updateRegion()" class="flex-1 qc-btn qc-btn-primary">确认更新</button>
    </div>
        </div>
    </div>
  </main>
  </div>

  <script>
    function selectAll() { alert('全选所有城市'); }
    function clearAll() { alert('清空所有选择'); }
    function selectHot() { alert('选择热门城市'); }
    function updateRegion() {
      if (confirm('确认更新地域定向设置？')) {
        alert('地域定向更新成功！');
        window.location.href = 'promotions.html';
      }
    }
  </script>
  <script src="nav-component.js"></script>
</body>
</html>
