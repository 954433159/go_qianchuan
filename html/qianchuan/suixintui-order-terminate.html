<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>终止随心推订单 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">⛔ 终止随心推订单</h2>
      <p class="mt-2 text-gray-600">终止正在投放的随心推订单</p>
    </div>
    
    <div class="qc-card mb-6 border-l-4 border-yellow-500">
      <div class="flex items-start">
        <svg class="w-6 h-6 text-yellow-600 mr-3 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <div>
          <h3 class="font-semibold text-yellow-900 mb-1">终止订单说明</h3>
          <p class="text-sm text-yellow-800">终止订单后将立即停止投放，已消耗预算不可退回，剩余预算将返回账户。</p>
        </div>
      </div>
    </div>

    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">订单信息</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">订单ID</label>
          <input type="text" class="qc-input" placeholder="输入订单ID" value="1234567890">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">广告主ID</label>
          <input type="text" class="qc-input" placeholder="输入广告主ID" value="9876543210">
        </div>
      </div>
      <button class="qc-btn qc-btn-primary mt-4">查询订单</button>
    </div>

    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">订单详情</h3>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-600 mb-1">订单名称</p>
          <p class="font-semibold text-gray-900">双11美妆直播推广</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-600 mb-1">订单状态</p>
          <span class="qc-badge qc-badge-success">投放中</span>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-600 mb-1">总预算</p>
          <p class="font-semibold text-gray-900 font-mono">¥5,000</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-600 mb-1">已消耗</p>
          <p class="font-semibold text-red-600 font-mono">¥1,280</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-600 mb-1">剩余预算</p>
          <p class="font-semibold text-green-600 font-mono">¥3,720</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <p class="text-sm text-gray-600 mb-1">投放时长</p>
          <p class="font-semibold text-gray-900">2小时38分</p>
        </div>
      </div>

      <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
        <h4 class="font-semibold text-red-900 mb-2">终止影响</h4>
        <ul class="space-y-1 text-sm text-red-800">
          <li>• 订单将立即停止投放</li>
          <li>• 已消耗预算 ¥1,280 不可退回</li>
          <li>• 剩余预算 ¥3,720 将返回账户余额</li>
          <li>• 终止后订单无法恢复</li>
        </ul>
      </div>

      <div class="flex items-center gap-3">
        <button class="qc-btn qc-btn-danger" onclick="if(confirm('确定要终止此订单吗？')) alert('订单已终止')">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          确认终止订单
        </button>
        <button class="qc-btn qc-btn-secondary" onclick="window.history.back()">取消</button>
      </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  <script src="nav-component.js"></script>
</body>
</html>
