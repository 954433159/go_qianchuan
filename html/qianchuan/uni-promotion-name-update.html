<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新全域推广计划名称 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="hidden md:block">
                    <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
                    <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- Sidebar - Reusable Component -->
        <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
            <nav class="p-4 space-y-6" id="main-nav"></nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                <!-- Breadcrumb -->
                <div class="flex items-center text-sm text-gray-500 mb-2">
                    <a href="dashboard.html" class="hover:text-blue-600">数据中心</a>
                    <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <a href="uni-promotions.html" class="hover:text-blue-600">全域推广</a>
                    <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span class="text-gray-900">更新计划名称</span>
                </div>

                <!-- Page Header -->
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">更新全域推广计划名称</h1>
                    <p class="mt-2 text-gray-600">批量修改全域推广计划名称，支持模板变量</p>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-lg border border-gray-200 p-6">
                    <form class="space-y-6">
                        <!-- 选择计划 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择推广计划 *</label>
                            <div class="border border-gray-300 rounded-lg p-4 max-h-64 overflow-y-auto">
                                <div class="space-y-2">
                                    <label class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded cursor-pointer">
                                        <input type="checkbox" class="rounded text-red-500 focus:ring-red-500">
                                        <div class="flex-1">
                                            <p class="font-medium text-gray-900">【全域】美妆专场 - 冬季促销</p>
                                            <p class="text-sm text-gray-500">ID: 7234567890123456</p>
                                        </div>
                                    </label>
                                    <label class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded cursor-pointer">
                                        <input type="checkbox" class="rounded text-red-500 focus:ring-red-500">
                                        <div class="flex-1">
                                            <p class="font-medium text-gray-900">【全域】服饰秋冬新品</p>
                                            <p class="text-sm text-gray-500">ID: 7234567890123457</p>
                                        </div>
                                    </label>
                                </div>
                            </div>
                            <p class="mt-2 text-sm text-gray-500">已选择: <span class="font-medium text-red-600">0</span> 个计划</p>
                        </div>

                        <!-- 名称模板 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">新名称模板 *</label>
                            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" 
                                   placeholder="例如: 【全域】{product_name} - {date}" maxlength="100">
                            <p class="mt-2 text-sm text-gray-500">支持变量: {product_name} 商品名, {date} 日期, {aweme} 抖音号</p>
                        </div>

                        <!-- 命名规则 -->
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                            <h3 class="text-sm font-semibold text-blue-900 mb-2">📋 命名规范</h3>
                            <ul class="text-sm text-blue-700 space-y-1">
                                <li>• 长度限制: 1-100 字符</li>
                                <li>• 避免特殊符号: < > \ / " ' 等</li>
                                <li>• 建议包含: 推广类型、商品/类目、日期或活动名</li>
                            </ul>
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center justify-between pt-4 border-t border-gray-200">
                            <button type="button" class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                                取消
                            </button>
                            <button type="submit" class="px-6 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg hover:from-red-600 hover:to-orange-600 shadow-sm">
                                批量更新名称
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="nav-component.js"></script>
</body>
</html>
