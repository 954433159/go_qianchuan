<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统错误 - 巨量千川</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./design-system.css">
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="qc-empty-state max-w-2xl">
      <!-- 错误图标 -->
      <div class="mb-8">
        <svg class="w-48 h-48 mx-auto text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>

      <!-- 错误标题 -->
      <div class="qc-empty-title text-3xl mb-4" id="error-title">
        系统错误
      </div>

      <!-- 错误描述 -->
      <div class="qc-empty-description text-base mb-8" id="error-description">
        抱歉，系统遇到了一些问题，请稍后再试。<br>
        如果问题持续存在，请联系技术支持。
      </div>

      <!-- 错误代码（可选） -->
      <div id="error-code" class="hidden mb-6 p-4 bg-gray-100 rounded-lg">
        <div class="text-xs text-gray-500 mb-1">错误代码</div>
        <code class="text-sm font-mono text-gray-700" id="error-code-text"></code>
      </div>

      <!-- 操作按钮 -->
      <div class="flex items-center gap-4 justify-center">
        <button onclick="location.reload()" class="qc-btn qc-btn-secondary">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          重新加载
        </button>
        <a href="./dashboard.html" class="qc-btn qc-btn-primary">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          返回首页
        </a>
      </div>

      <!-- 帮助信息 -->
      <div class="mt-12 pt-8 border-t border-gray-200">
        <p class="text-sm text-gray-500 mb-4">需要帮助？</p>
        <div class="flex flex-col gap-2 text-sm">
          <div class="flex items-center justify-center gap-2 text-gray-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <span>客服邮箱：support@qianchuan.com</span>
          </div>
          <div class="flex items-center justify-center gap-2 text-gray-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            <span>客服热线：400-123-4567</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 从 URL 获取错误信息
    const urlParams = new URLSearchParams(window.location.search);
    const errorType = urlParams.get('type') || 'unknown';
    const errorMessage = urlParams.get('message');
    const errorCode = urlParams.get('code');

    // 根据错误类型设置内容
    const errorConfigs = {
      'network': {
        title: '网络连接失败',
        description: '无法连接到服务器，请检查您的网络连接后重试。'
      },
      'timeout': {
        title: '请求超时',
        description: '服务器响应时间过长，请稍后重试。'
      },
      'unauthorized': {
        title: '未授权访问',
        description: '您没有权限访问此资源，请重新登录或联系管理员。'
      },
      'forbidden': {
        title: '访问被拒绝',
        description: '您的账户没有访问此功能的权限。'
      },
      'server': {
        title: '服务器错误',
        description: '服务器遇到了内部错误，我们正在努力修复。'
      },
      'unknown': {
        title: '系统错误',
        description: '抱歉，系统遇到了一些问题，请稍后再试。'
      }
    };

    const config = errorConfigs[errorType] || errorConfigs['unknown'];
    document.getElementById('error-title').textContent = config.title;
    document.getElementById('error-description').innerHTML = 
      errorMessage || config.description;

    if (errorCode) {
      document.getElementById('error-code').classList.remove('hidden');
      document.getElementById('error-code-text').textContent = errorCode;
    }

    // 记录错误
    console.error('Error Page:', {
      type: errorType,
      message: errorMessage,
      code: errorCode,
      url: window.location.href,
      referrer: document.referrer,
      timestamp: new Date().toISOString()
    });

    // 如果是授权错误，3秒后跳转到登录页
    if (errorType === 'unauthorized') {
      setTimeout(() => {
        window.location.href = './oauth-authorize.html';
      }, 3000);
    }
  </script>
</body>
</html>
