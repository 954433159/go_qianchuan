<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROI目标建议 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">

    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">🎯 ROI目标建议</h2>
      <p class="mt-2 text-gray-600">获取智能ROI目标建议,优化投放收益</p>
    </div>
    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">计划信息</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-2">广告主ID</label><input type="text" class="qc-input" placeholder="输入广告主ID"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-2">商品ID</label><input type="text" class="qc-input" placeholder="输入商品ID"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-2">日预算(元)</label><input type="number" class="qc-input" placeholder="输入日预算" value="1000"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-2">历史数据周期</label><select class="qc-input"><option>近7天</option><option>近14天</option><option>近30天</option></select></div>
      </div>
      <button class="qc-btn qc-btn-primary mt-4">获取建议</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="qc-card bg-gradient-to-br from-green-50 to-emerald-50 border-green-200">
        <div class="flex items-center gap-3 mb-4"><svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg><h3 class="text-lg font-semibold text-gray-900">保守目标</h3></div>
        <div class="mb-4"><div class="text-4xl font-bold qc-roi-good mb-2">4.2</div><p class="text-sm text-gray-600">适合稳健投放，成功率高</p></div>
        <div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-600">预估成功率</span><span class="font-semibold text-green-600">85%</span></div><div class="flex justify-between"><span class="text-gray-600">预估日GMV</span><span class="font-semibold">¥4,200</span></div></div>
        <button class="qc-btn qc-btn-secondary w-full mt-4">采用此目标</button>
      </div>
      <div class="qc-card bg-gradient-to-br from-blue-50 to-cyan-50 border-blue-300 border-2">
        <div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><h3 class="text-lg font-semibold text-gray-900">推荐目标</h3></div><span class="qc-badge qc-badge-info">推荐</span></div>
        <div class="mb-4"><div class="text-5xl font-bold qc-roi-excellent mb-2">5.8</div><p class="text-sm text-gray-600">平衡收益与风险</p></div>
        <div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-600">预估成功率</span><span class="font-semibold text-blue-600">68%</span></div><div class="flex justify-between"><span class="text-gray-600">预估日GMV</span><span class="font-semibold">¥5,800</span></div></div>
        <button class="qc-btn qc-btn-primary w-full mt-4">采用此目标</button>
      </div>
      <div class="qc-card bg-gradient-to-br from-orange-50 to-yellow-50 border-orange-200">
        <div class="flex items-center gap-3 mb-4"><svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><h3 class="text-lg font-semibold text-gray-900">激进目标</h3></div>
        <div class="mb-4"><div class="text-4xl font-bold qc-roi-excellent mb-2">8.5</div><p class="text-sm text-gray-600">高收益，高风险</p></div>
        <div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-600">预估成功率</span><span class="font-semibold text-orange-600">42%</span></div><div class="flex justify-between"><span class="text-gray-600">预估日GMV</span><span class="font-semibold">¥8,500</span></div></div>
        <button class="qc-btn qc-btn-secondary w-full mt-4">采用此目标</button>
      </div>
    </div>
    <div class="qc-card mt-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">历史ROI趋势</h3>
      <div class="h-64 flex items-end justify-between gap-2">
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 52%"></div>
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 61%"></div>
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 58%"></div>
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 68%"></div>
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 72%"></div>
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 85%"></div>
        <div class="flex-1 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 100%"></div>
      </div>
      <div class="flex justify-between mt-4 text-xs text-gray-500"><span>7天前</span><span>6天前</span><span>5天前</span><span>4天前</span><span>3天前</span><span>2天前</span><span class="font-medium text-gray-900">昨天</span></div>
    </div>
        </div>
    </div>
  </main>
  </div>
  <script src="nav-component.js"></script>
</body>
</html>
