<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新全域推广预算 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="hidden md:block">
                    <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
                    <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
            <nav class="p-4 space-y-6" id="main-nav"></nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="flex items-center text-sm text-gray-500 mb-2">
                    <a href="dashboard.html" class="hover:text-blue-600">数据中心</a>
                    <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <a href="uni-promotions.html" class="hover:text-blue-600">全域推广</a>
                    <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span class="text-gray-900">更新预算</span>
                </div>

                <div>
                    <h1 class="text-3xl font-bold text-gray-900">更新全域推广预算</h1>
                    <p class="mt-2 text-gray-600">批量调整日预算/总预算，支持百分比或固定金额</p>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 p-6">
                    <form class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择推广计划 *</label>
                            <div class="border border-gray-300 rounded-lg p-4 max-h-64 overflow-y-auto">
                                <div class="space-y-2">
                                    <label class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded cursor-pointer">
                                        <input type="checkbox" class="rounded text-red-500 focus:ring-red-500">
                                        <div class="flex-1">
                                            <p class="font-medium text-gray-900">【全域】美妆专场 - 冬季促销</p>
                                            <p class="text-sm text-gray-500">当前日预算: ¥500 | 总预算: ¥10,000</p>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">预算类型 *</label>
                                <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                                    <option>日预算</option>
                                    <option>总预算</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">调整方式 *</label>
                                <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                                    <option>固定金额</option>
                                    <option>百分比调整</option>
                                    <option>增加金额</option>
                                    <option>减少金额</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">新预算金额 (元) *</label>
                            <input type="number" step="0.01" min="100" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="100.00">
                            <p class="mt-2 text-sm text-gray-500">最低预算: ¥100/天</p>
                        </div>

                        <div class="bg-orange-50 border border-orange-200 rounded-lg p-4">
                            <h3 class="text-sm font-semibold text-orange-900 mb-2">⚠️ 预算调整提示</h3>
                            <ul class="text-sm text-orange-700 space-y-1">
                                <li>• 预算提升可能影响计划学习状态</li>
                                <li>• 大幅降低预算可能导致流量下降</li>
                                <li>• 建议根据ROI数据合理调整</li>
                            </ul>
                        </div>

                        <div class="flex items-center justify-between pt-4 border-t border-gray-200">
                            <button type="button" class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
                            <button type="submit" class="px-6 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg hover:from-red-600 hover:to-orange-600 shadow-sm">批量更新预算</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="nav-component.js"></script>
</body>
</html>
