<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="./design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随心推数据报表 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="hidden md:block"><h1 class="text-lg font-bold text-gray-900">千川直播带货</h1></div>
            </div>
        </div>
    </header>
    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
            <nav class="p-4 space-y-6" id="main-nav"></nav>
        </aside>
        <main class="flex-1 p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">随心推数据报表</h1>
                    <p class="mt-2 text-gray-600">查看随心推订单的投放数据与效果分析</p>
                </div>
                
                <!-- 筛选器 -->
                <div class="bg-white rounded-lg border p-4">
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">日期范围</label>
                            <select class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option>今日</option>
                                <option>近7日</option>
                                <option>近30日</option>
                                <option>自定义</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">订单状态</label>
                            <select class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option>全部</option>
                                <option>投放中</option>
                                <option>已完成</option>
                                <option>已终止</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">数据维度</label>
                            <select class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option>订单维度</option>
                                <option>视频维度</option>
                                <option>抖音号维度</option>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button class="w-full px-4 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg shadow-sm">查询</button>
                        </div>
                    </div>
                </div>

                <!-- 指标卡片 -->
                <div class="grid grid-cols-5 gap-4">
                    <div class="bg-white rounded-lg border p-4">
                        <p class="text-sm text-gray-600">总消耗</p>
                        <p class="text-2xl font-bold text-gray-900 mt-2">¥12,456</p>
                        <p class="text-xs text-green-600 mt-1">+15.3% vs 昨日</p>
                    </div>
                    <div class="bg-white rounded-lg border p-4">
                        <p class="text-sm text-gray-600">展示量</p>
                        <p class="text-2xl font-bold text-gray-900 mt-2">1.2M</p>
                        <p class="text-xs text-green-600 mt-1">+18.2%</p>
                    </div>
                    <div class="bg-white rounded-lg border p-4">
                        <p class="text-sm text-gray-600">点击量</p>
                        <p class="text-2xl font-bold text-gray-900 mt-2">45.6K</p>
                        <p class="text-xs text-green-600 mt-1">+12.7%</p>
                    </div>
                    <div class="bg-white rounded-lg border p-4">
                        <p class="text-sm text-gray-600">转化数</p>
                        <p class="text-2xl font-bold text-gray-900 mt-2">2,345</p>
                        <p class="text-xs text-green-600 mt-1">+20.1%</p>
                    </div>
                    <div class="bg-white rounded-lg border p-4">
                        <p class="text-sm text-gray-600">ROI</p>
                        <p class="text-2xl font-bold text-green-600 mt-2">5.2</p>
                        <p class="text-xs text-green-600 mt-1">+0.4</p>
                    </div>
                </div>

                <!-- 数据表格 -->
                <div class="bg-white rounded-lg border">
                    <div class="p-4 border-b flex justify-between items-center">
                        <h2 class="font-semibold">订单数据列表</h2>
                        <button class="px-3 py-1.5 text-sm border rounded-lg hover:bg-gray-50">导出Excel</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">订单ID</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">视频</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">消耗</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">展示</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">点击</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">CTR</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">转化</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">ROI</th>
                                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">状态</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <tr class="hover:bg-gray-50">
                                    <td class="px-4 py-4 text-sm">7234567890123</td>
                                    <td class="px-4 py-4 text-sm">冬季新品羽绒服</td>
                                    <td class="px-4 py-4 text-sm text-right">¥2,345</td>
                                    <td class="px-4 py-4 text-sm text-right">235K</td>
                                    <td class="px-4 py-4 text-sm text-right">8.9K</td>
                                    <td class="px-4 py-4 text-sm text-right">3.78%</td>
                                    <td class="px-4 py-4 text-sm text-right">456</td>
                                    <td class="px-4 py-4 text-sm text-right font-semibold text-green-600">6.2</td>
                                    <td class="px-4 py-4 text-center"><span class="px-2 py-1 text-xs bg-green-100 text-green-700 rounded-full">已完成</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="nav-component.js"></script>
</body>
</html>
