<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传创意 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">📤 上传创意</h2>
      <p class="mt-2 text-gray-600">上传您的广告创意素材</p>
    </div>

    <!-- 上传类型选择 -->
    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">选择素材类型</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <label class="qc-card qc-card-interactive border-2 border-blue-500 bg-blue-50 cursor-pointer">
          <input type="radio" name="media_type" value="image" class="hidden" checked>
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-3 bg-gradient-to-br from-blue-100 to-blue-200 rounded-full flex items-center justify-center">
              <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <h4 class="font-semibold text-gray-900 mb-1">图片</h4>
            <p class="text-xs text-gray-600">JPG, PNG (≤5MB)</p>
          </div>
        </label>

        <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300 cursor-pointer">
          <input type="radio" name="media_type" value="video" class="hidden">
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
              <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
              </svg>
            </div>
            <h4 class="font-semibold text-gray-900 mb-1">视频</h4>
            <p class="text-xs text-gray-600">MP4, MOV (≤100MB)</p>
          </div>
        </label>

        <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300 cursor-pointer">
          <input type="radio" name="media_type" value="carousel" class="hidden">
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
              <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
              </svg>
            </div>
            <h4 class="font-semibold text-gray-900 mb-1">轮播图</h4>
            <p class="text-xs text-gray-600">2-10张图片</p>
          </div>
        </label>
      </div>
    </div>

    <!-- 上传区域 -->
    <div class="qc-card mb-6">
      <div id="upload-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:border-blue-400 hover:bg-blue-50 cursor-pointer transition-colors">
        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">拖拽文件到此处或点击上传</h3>
        <p class="text-sm text-gray-600 mb-4">支持 JPG, PNG 格式，单个文件不超过 5MB</p>
        <button class="qc-btn qc-btn-primary">选择文件</button>
      </div>

      <!-- 上传列表 -->
      <div id="upload-list" class="mt-6 space-y-3 hidden">
        <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-lg">
          <div class="w-16 h-16 bg-gray-200 rounded flex-shrink-0"></div>
          <div class="flex-1">
            <div class="font-medium text-gray-900 mb-1">产品主图.jpg</div>
            <div class="flex items-center gap-2">
              <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-blue-500 to-blue-600" style="width: 75%"></div>
              </div>
              <span class="text-sm text-gray-600">75%</span>
            </div>
          </div>
          <button class="text-red-600 hover:text-red-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 创意信息 -->
    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">创意信息</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">创意名称 <span class="text-red-500">*</span></label>
          <input type="text" class="qc-input" placeholder="为您的创意起一个名称" maxlength="50">
          <p class="mt-1 text-xs text-gray-500">最多50个字符</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">创意分类</label>
          <select class="qc-input">
            <option>美妆护肤</option>
            <option>服饰鞋包</option>
            <option>食品饮料</option>
            <option>数码家电</option>
            <option>其他</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">标签</label>
          <input type="text" class="qc-input" placeholder="添加标签，用逗号分隔">
          <p class="mt-1 text-xs text-gray-500">例如：新品、促销、爆款</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">创意描述</label>
          <textarea class="qc-input" rows="3" placeholder="描述您的创意内容" maxlength="200"></textarea>
          <p class="mt-1 text-xs text-gray-500">最多200个字符</p>
        </div>
      </div>
    </div>

    <!-- 审核要求 -->
    <div class="bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-200 rounded-xl p-6 mb-6">
      <div class="flex items-start gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-yellow-500 to-orange-500 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <div class="flex-1">
          <h4 class="text-lg font-semibold text-gray-900 mb-3">⚠️ 创意审核要求</h4>
          <ul class="space-y-2 text-sm text-gray-700">
            <li class="flex items-start gap-2">
              <span class="text-orange-500 font-bold mt-0.5">•</span>
              <span>图片需清晰，不得模糊、变形、拉伸</span>
            </li>
            <li class="flex items-start gap-2">
              <span class="text-orange-500 font-bold mt-0.5">•</span>
              <span>不得包含违禁词、虚假宣传、夸大宣传内容</span>
            </li>
            <li class="flex items-start gap-2">
              <span class="text-orange-500 font-bold mt-0.5">•</span>
              <span>不得使用"国家级"、"最高级"等绝对化用语</span>
            </li>
            <li class="flex items-start gap-2">
              <span class="text-orange-500 font-bold mt-0.5">•</span>
              <span>视频时长建议15-60秒，前3秒需有吸引力</span>
            </li>
            <li class="flex items-start gap-2">
              <span class="text-orange-500 font-bold mt-0.5">•</span>
              <span>创意审核通常在2-4小时内完成</span>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 底部操作 -->
    <div class="flex items-center justify-between">
      <button onclick="window.location.href='creatives.html'" class="qc-btn qc-btn-secondary">
        取消
      </button>
      <div class="flex gap-3">
        <button onclick="saveDraft()" class="qc-btn qc-btn-secondary">
          保存草稿
        </button>
        <button onclick="submitCreative()" class="qc-btn qc-btn-primary">
          提交审核
        </button>
      </div>
    </div>

        </div>
    </div>
  </main>
  </div>

  <script>
    // 素材类型切换
    document.querySelectorAll('input[name="media_type"]').forEach(radio => {
      radio.addEventListener('change', function() {
        document.querySelectorAll('input[name="media_type"]').forEach(r => {
          const label = r.closest('label');
          label.classList.remove('border-blue-500', 'bg-blue-50');
          label.classList.add('border-gray-200');
        });
        const label = this.closest('label');
        label.classList.remove('border-gray-200');
        label.classList.add('border-blue-500', 'bg-blue-50');

        // 更新上传提示
        const uploadZone = document.getElementById('upload-zone');
        if (this.value === 'video') {
          uploadZone.querySelector('p').textContent = '支持 MP4, MOV 格式，单个文件不超过 100MB';
        } else if (this.value === 'carousel') {
          uploadZone.querySelector('p').textContent = '支持 JPG, PNG 格式，可上传2-10张图片';
        } else {
          uploadZone.querySelector('p').textContent = '支持 JPG, PNG 格式，单个文件不超过 5MB';
        }
      });
    });

    // 上传区域点击
    document.getElementById('upload-zone').addEventListener('click', function() {
      document.getElementById('upload-list').classList.remove('hidden');
    });

    function saveDraft() {
      alert('创意草稿已保存！');
    }

    function submitCreative() {
      const name = document.querySelector('input[placeholder*="名称"]').value;
      if (!name) {
        alert('请输入创意名称');
        return;
      }
      alert('创意已提交审核！\n审核通常在2-4小时内完成\n您可以在创意列表中查看审核进度');
      window.location.href = 'creatives.html';
    }
  </script>

  <script src="nav-component.js"></script>
</body>
</html>
