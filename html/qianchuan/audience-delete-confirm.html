<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>删除人群包确认 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="px-6 py-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">
                删除人群包
            </h1>
        </div>
    </header>

    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 h-screen sticky top-16 overflow-y-auto">
            <nav id="main-nav"></nav>
        </aside>

        <main class="flex-1 p-8 max-w-3xl mx-auto">
            <div class="bg-gradient-to-r from-red-50 to-orange-50 rounded-xl border-2 border-red-200 p-8 mb-6">
                <div class="flex items-start gap-4 mb-6">
                    <div class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">确认删除人群包？</h2>
                        <p class="text-gray-600">此操作不可撤销，删除后将无法恢复该人群包的数据。</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
                <h3 class="font-semibold text-gray-900 mb-4">待删除人群包</h3>
                <div class="space-y-4">
                    <div class="p-4 bg-gray-50 rounded-lg">
                        <div class="flex items-start justify-between mb-3">
                            <div>
                                <h4 class="font-semibold text-gray-900 mb-1">高价值客户群</h4>
                                <div class="text-sm text-gray-500">ID: 789456123 | 创建于 2024-12-15</div>
                            </div>
                            <span class="px-3 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">自定义人群</span>
                        </div>
                        <div class="grid grid-cols-3 gap-4 text-sm">
                            <div>
                                <div class="text-gray-500 mb-1">人群规模</div>
                                <div class="font-semibold text-gray-900">85.6万人</div>
                            </div>
                            <div>
                                <div class="text-gray-500 mb-1">覆盖率</div>
                                <div class="font-semibold text-gray-900">12.5%</div>
                            </div>
                            <div>
                                <div class="text-gray-500 mb-1">最后使用</div>
                                <div class="font-semibold text-gray-900">3天前</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
                <h3 class="font-semibold text-gray-900 mb-4">影响分析</h3>
                <div class="space-y-4">
                    <div class="flex items-start gap-3 p-4 bg-orange-50 border border-orange-200 rounded-lg">
                        <svg class="w-5 h-5 text-orange-600 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                        </svg>
                        <div>
                            <div class="font-semibold text-orange-900 mb-1">影响 5 个投放计划</div>
                            <div class="text-sm text-orange-700">这些计划正在使用该人群包作为定向条件</div>
                        </div>
                    </div>

                    <div class="flex items-start gap-3 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                        <svg class="w-5 h-5 text-blue-600 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
                        </svg>
                        <div>
                            <div class="font-semibold text-blue-900 mb-1">包含在 2 个分组中</div>
                            <div class="text-sm text-blue-700">删除后将从"高价值客户"和"VIP会员"分组中移除</div>
                        </div>
                    </div>

                    <div class="flex items-start gap-3 p-4 bg-red-50 border border-red-200 rounded-lg">
                        <svg class="w-5 h-5 text-red-600 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                        <div>
                            <div class="font-semibold text-red-900 mb-1">数据将永久删除</div>
                            <div class="text-sm text-red-700">包括历史投放数据、标签信息等将无法恢复</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
                <h3 class="font-semibold text-gray-900 mb-4">删除后处理方案</h3>
                <div class="space-y-3">
                    <label class="flex items-start gap-3 p-4 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-orange-400 transition">
                        <input type="radio" name="deleteOption" value="pause" checked class="mt-1">
                        <div>
                            <div class="font-medium text-gray-900 mb-1">暂停使用该人群的计划</div>
                            <div class="text-sm text-gray-500">所有使用该人群的投放计划将被自动暂停</div>
                        </div>
                    </label>

                    <label class="flex items-start gap-3 p-4 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-orange-400 transition">
                        <input type="radio" name="deleteOption" value="replace" class="mt-1">
                        <div>
                            <div class="font-medium text-gray-900 mb-1">替换为其他人群包</div>
                            <div class="text-sm text-gray-500">选择一个替代人群包继续投放</div>
                            <select class="mt-2 w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                                <option>请选择替代人群包...</option>
                                <option>活跃用户群</option>
                                <option>潜在客户群</option>
                            </select>
                        </div>
                    </label>

                    <label class="flex items-start gap-3 p-4 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-orange-400 transition">
                        <input type="radio" name="deleteOption" value="remove" class="mt-1">
                        <div>
                            <div class="font-medium text-gray-900 mb-1">仅移除人群定向</div>
                            <div class="text-sm text-gray-500">计划继续运行，但移除该人群的定向限制</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
                <label class="flex items-center gap-3">
                    <input type="checkbox" id="confirmCheck" class="rounded w-5 h-5">
                    <span class="text-gray-700">我已了解删除的影响，确认删除该人群包</span>
                </label>
            </div>

            <div class="flex justify-end gap-3">
                <button onclick="history.back()" class="btn-secondary">取消</button>
                <button onclick="confirmDelete()" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition disabled:opacity-50 disabled:cursor-not-allowed" id="deleteBtn" disabled>
                    确认删除
                </button>
            </div>
        </main>
    </div>

    <script src="nav-component.js"></script>
    <script>
        document.getElementById('confirmCheck').addEventListener('change', function(e) {
            document.getElementById('deleteBtn').disabled = !e.target.checked;
        });

        function confirmDelete() {
            const option = document.querySelector('input[name="deleteOption"]:checked').value;
            alert(`已删除人群包，处理方案: ${option}`);
            window.location.href = 'audiences.html';
        }
    </script>
</body>
</html>
