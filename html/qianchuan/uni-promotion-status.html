<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新推广状态 - 巨量千川</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./design-system.css">
</head>
<body class="bg-gray-50">
  <div id="qc-header"></div>
  <div class="flex">
    <div id="qc-sidebar" data-active="uni-promotion"></div>
    <main id="main-content" class="flex-1 ml-64 mt-16 p-8">
      <div id="qc-page-header"></div>

      <div class="max-w-4xl mx-auto">
        <form id="status-form" data-validate-form class="qc-card">
          <div class="space-y-6">
            <div>
              <h3 class="text-lg font-semibold text-gray-900 mb-4">批量状态更新</h3>
              <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <div class="flex items-start gap-3">
                  <svg class="w-5 h-5 text-blue-600 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  <div class="text-sm text-blue-800">
                    <p class="font-medium mb-1">操作提示</p>
                    <p>已选中 <span id="selected-count" class="font-bold">0</span> 个全域推广计划</p>
                  </div>
                </div>
              </div>

              <div>
                <label for="opt_status" class="block text-sm font-medium text-gray-700 mb-2">
                  目标状态 <span class="text-red-500">*</span>
                </label>
                <select id="opt_status" name="opt_status" class="qc-input" data-validate="required" data-label="目标状态">
                  <option value="">请选择目标状态</option>
                  <option value="AD_STATUS_ENABLE">启用投放</option>
                  <option value="AD_STATUS_DISABLE">暂停投放</option>
                  <option value="AD_STATUS_DELETE">删除（不可恢复）</option>
                </select>
              </div>
            </div>

            <div id="warning-section" class="hidden pt-6 border-t">
              <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="flex items-start gap-3">
                  <svg class="w-5 h-5 text-red-600 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                  </svg>
                  <div class="text-sm text-red-800">
                    <p class="font-medium mb-1">风险提示</p>
                    <p id="warning-text"></p>
                  </div>
                </div>
              </div>
            </div>

            <div class="pt-6 border-t">
              <label class="flex items-center">
                <input type="checkbox" name="confirm" id="confirm" class="w-4 h-4 text-red-600 border-gray-300 rounded">
                <span class="ml-2 text-sm text-gray-700">我已确认并理解此操作的影响</span>
              </label>
            </div>
          </div>

          <div class="flex items-center justify-end gap-3 mt-8 pt-6 border-t">
            <button type="button" onclick="history.back()" class="qc-btn qc-btn-secondary">取消</button>
            <button type="submit" class="qc-btn qc-btn-primary">确认更新</button>
          </div>
        </form>

        <!-- 选中的计划列表 -->
        <div class="qc-card mt-6">
          <h3 class="text-lg font-semibold text-gray-900 mb-4">待操作计划列表</h3>
          <div id="ad-list" class="space-y-2"></div>
        </div>
      </div>
          </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  </div>
  </div>

  <script src="./assets/js/common.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/validate.js"></script>

  <script>
    document.getElementById('qc-page-header').innerHTML = QC.renderPageHeader({
      title: '批量更新推广状态',
      description: '修改全域推广计划的投放状态',
      breadcrumbs: [
        { label: '全域推广', url: './uni-promotions.html' },
        { label: '批量操作' }
      ]
    });

    const urlParams = new URLSearchParams(window.location.search);
    const adIds = urlParams.get('ids') ? urlParams.get('ids').split(',') : [];
    document.getElementById('selected-count').textContent = adIds.length;

    // 加载计划信息
    if (adIds.length > 0) {
      api.post('/uni_promotion/list', { ad_ids: adIds })
        .then(data => {
          const listHtml = data.list.map(ad => `
            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
              <div>
                <p class="font-medium text-gray-900">${ad.name}</p>
                <p class="text-sm text-gray-500">ID: ${ad.ad_id}</p>
              </div>
              <span class="qc-badge ${ad.status === 'enable' ? 'qc-badge-success' : 'qc-badge-gray'}">
                ${ad.status === 'enable' ? '投放中' : '已暂停'}
              </span>
            </div>
          `).join('');
          document.getElementById('ad-list').innerHTML = listHtml;
        });
    }

    // 状态选择变化
    document.getElementById('opt_status').addEventListener('change', (e) => {
      const warningSection = document.getElementById('warning-section');
      const warningText = document.getElementById('warning-text');
      
      if (e.target.value === 'AD_STATUS_DELETE') {
        warningSection.classList.remove('hidden');
        warningText.textContent = '删除操作不可恢复，计划数据将永久清除，请谨慎操作！';
        document.getElementById('confirm').required = true;
      } else if (e.target.value === 'AD_STATUS_DISABLE') {
        warningSection.classList.remove('hidden');
        warningText.textContent = '暂停后计划将停止投放，不再产生消耗，但可随时恢复。';
        document.getElementById('confirm').required = false;
      } else {
        warningSection.classList.add('hidden');
        document.getElementById('confirm').required = false;
      }
    });

    document.getElementById('status-form').addEventListener('formValidated', (e) => {
      if (e.detail.isValid) {
        const status = document.getElementById('opt_status').value;
        const isDelete = status === 'AD_STATUS_DELETE';
        
        if (isDelete && !document.getElementById('confirm').checked) {
          alert('请先确认理解删除操作的影响');
          return;
        }

        if (isDelete && !confirm(`确定要删除 ${adIds.length} 个计划吗？此操作不可恢复！`)) {
          return;
        }

        QC.showLoading('处理中...');
        api.post('/uni_promotion/status/update', {
          ad_ids: adIds,
          opt_status: status
        })
          .then(data => {
            QC.hideLoading();
            alert('更新成功');
            setTimeout(() => window.location.href = './uni-promotions.html', 1000);
          })
          .catch(error => {
            QC.hideLoading();
            alert('更新失败：' + error.message);
          });
      }
    });
  </script>
  <script src="nav-component.js"></script>
</body>
</html>
