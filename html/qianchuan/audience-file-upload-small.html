<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传人群文件 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="hidden md:block"><h1 class="text-lg font-bold text-gray-900">千川直播带货</h1></div>
            </div>
        </div>
    </header>

    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
            <nav class="p-4 space-y-6" id="main-nav"></nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">上传人群文件（小文件）</h1>
                    <p class="mt-2 text-gray-600">支持CSV/TXT格式，文件大小<5MB，数据量<10万行</p>
                </div>

                <!-- 上传区域 -->
                <div class="bg-white rounded-lg border p-6">
                    <div id="upload-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-red-400 transition-colors cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4">
                                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                </svg>
                            </div>
                            <p class="text-lg font-medium text-gray-900 mb-2">点击或拖拽文件到此处上传</p>
                            <p class="text-sm text-gray-500">支持 CSV, TXT 格式，最大 5MB</p>
                            <input type="file" id="file-input" accept=".csv,.txt" class="hidden">
                        </div>
                    </div>

                    <!-- 文件信息 -->
                    <div id="file-info" class="mt-4 p-4 bg-gray-50 rounded-lg hidden">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <div>
                                    <p class="font-medium text-gray-900" id="file-name"></p>
                                    <p class="text-sm text-gray-500"><span id="file-size"></span> · <span id="file-rows"></span></p>
                                </div>
                            </div>
                            <button onclick="removeFile()" class="p-2 hover:bg-gray-200 rounded-lg">
                                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 字段映射 -->
                <div id="mapping-section" class="bg-white rounded-lg border p-6 hidden">
                    <h2 class="text-lg font-semibold mb-4">字段映射</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">数据类型 *</label>
                            <select id="data-type" class="w-full px-4 py-2 border rounded-lg">
                                <option value="phone">手机号</option>
                                <option value="idfa">IDFA (iOS设备号)</option>
                                <option value="imei">IMEI (Android设备号)</option>
                                <option value="oaid">OAID (Android统一设备号)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">目标字段 *</label>
                            <select id="target-field" class="w-full px-4 py-2 border rounded-lg">
                                <option value="">自动检测</option>
                                <option value="col1">第1列</option>
                                <option value="col2">第2列</option>
                                <option value="col3">第3列</option>
                            </select>
                        </div>
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                            <h3 class="text-sm font-semibold text-blue-900 mb-2">📋 数据预览</h3>
                            <div id="data-preview" class="text-sm text-blue-700 font-mono"></div>
                        </div>
                    </div>
                </div>

                <!-- 人群设置 -->
                <div id="audience-settings" class="bg-white rounded-lg border p-6 hidden">
                    <h2 class="text-lg font-semibold mb-4">人群信息</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">人群名称 *</label>
                            <input type="text" id="audience-name" class="w-full px-4 py-2 border rounded-lg" placeholder="例如：高价值客户_20250111" maxlength="50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">人群描述</label>
                            <textarea id="audience-desc" class="w-full px-4 py-2 border rounded-lg" rows="3" placeholder="可选，描述人群特征" maxlength="200"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">分组</label>
                            <select id="audience-group" class="w-full px-4 py-2 border rounded-lg">
                                <option value="">默认分组</option>
                                <option value="high_value">高价值客户</option>
                                <option value="potential">潜在用户</option>
                                <option value="reactivation">召回用户</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 上传进度 -->
                <div id="progress-section" class="bg-white rounded-lg border p-6 hidden">
                    <h2 class="text-lg font-semibold mb-4">上传进度</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-600">正在上传...</span>
                            <span id="progress-percent" class="font-medium text-red-600">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                            <div id="progress-bar" class="h-full bg-gradient-to-r from-red-500 to-orange-500 transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <p class="text-xs text-gray-500" id="progress-info"></p>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="flex justify-between">
                    <button onclick="window.location.href='audiences.html'" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                    <button id="submit-btn" onclick="submitUpload()" disabled class="px-6 py-2 bg-gray-400 text-white rounded-lg cursor-not-allowed">
                        开始上传
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="nav-component.js"></script>
    <script>
        let selectedFile = null;

        // 绑定上传区域事件
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('border-red-500', 'bg-red-50');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('border-red-500', 'bg-red-50');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('border-red-500', 'bg-red-50');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.name.match(/\.(csv|txt)$/i)) {
                alert('仅支持CSV或TXT格式');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('文件大小不能超过5MB');
                return;
            }

            selectedFile = file;
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-size').textContent = formatFileSize(file.size);
            document.getElementById('file-info').classList.remove('hidden');
            document.getElementById('mapping-section').classList.remove('hidden');
            document.getElementById('audience-settings').classList.remove('hidden');

            // 读取并预览文件
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const lines = text.split('\n').filter(l => l.trim());
                document.getElementById('file-rows').textContent = `${lines.length} 行数据`;
                
                const preview = lines.slice(0, 3).join('\n');
                document.getElementById('data-preview').textContent = preview || '无数据';
            };
            reader.readAsText(file);

            enableSubmit();
        }

        function removeFile() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('file-info').classList.add('hidden');
            document.getElementById('mapping-section').classList.add('hidden');
            document.getElementById('audience-settings').classList.add('hidden');
            disableSubmit();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function enableSubmit() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = false;
            btn.classList.remove('bg-gray-400', 'cursor-not-allowed');
            btn.classList.add('bg-gradient-to-r', 'from-red-500', 'to-orange-500', 'hover:from-red-600', 'hover:to-orange-600');
        }

        function disableSubmit() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.classList.add('bg-gray-400', 'cursor-not-allowed');
            btn.classList.remove('bg-gradient-to-r', 'from-red-500', 'to-orange-500');
        }

        async function submitUpload() {
            if (!selectedFile) return;

            const audienceName = document.getElementById('audience-name').value.trim();
            if (!audienceName) {
                alert('请填写人群名称');
                return;
            }

            document.getElementById('progress-section').classList.remove('hidden');
            disableSubmit();

            // 模拟上传进度
            for (let i = 0; i <= 100; i += 5) {
                await new Promise(r => setTimeout(r, 100));
                document.getElementById('progress-bar').style.width = i + '%';
                document.getElementById('progress-percent').textContent = i + '%';
                
                if (i < 30) document.getElementById('progress-info').textContent = '正在校验文件格式...';
                else if (i < 60) document.getElementById('progress-info').textContent = '正在解析数据...';
                else if (i < 90) document.getElementById('progress-info').textContent = '正在上传...';
                else document.getElementById('progress-info').textContent = '处理完成！';
            }

            setTimeout(() => {
                alert('上传成功！人群包ID: 1234567890');
                window.location.href = 'audiences.html';
            }, 500);
        }
    </script>
</body>
</html>
