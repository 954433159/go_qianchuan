<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加关键词 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">🔑 添加关键词</h2>
      <p class="mt-2 text-gray-600">为您的广告计划添加新的搜索关键词</p>
    </div>

    <!-- 添加方式切换 -->
    <div class="qc-card mb-6">
      <div class="flex items-center gap-4 mb-6">
        <button onclick="switchMode('single')" id="btn-single" class="flex-1 py-3 bg-gradient-to-r from-red-500 to-orange-500 text-white font-medium rounded-lg">
          <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
          </svg>
          单个添加
        </button>
        <button onclick="switchMode('batch')" id="btn-batch" class="flex-1 py-3 bg-white border-2 border-gray-200 text-gray-700 font-medium rounded-lg hover:border-gray-300">
          <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          批量添加
        </button>
      </div>
    </div>

    <!-- 单个添加模式 -->
    <div id="mode-single" class="qc-card">
      <h3 class="text-xl font-semibold text-gray-900 mb-6">关键词信息</h3>

      <div class="space-y-6">
        
        <!-- 选择广告计划 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            选择广告计划 <span class="text-red-500">*</span>
          </label>
          <select class="qc-input">
            <option value="">请选择广告计划</option>
            <option value="1">春季大促-直播推广</option>
            <option value="2">新品推广计划</option>
            <option value="3">品牌宣传计划</option>
          </select>
        </div>

        <!-- 关键词输入 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            关键词 <span class="text-red-500">*</span>
          </label>
          <input type="text" class="qc-input" placeholder="请输入关键词，例如：美妆护肤品" maxlength="30">
          <p class="mt-1 text-xs text-gray-500">最多30个字符，建议使用用户常搜的词汇</p>
        </div>

        <!-- 匹配类型 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-3">
            匹配类型 <span class="text-red-500">*</span>
          </label>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <label class="qc-card qc-card-interactive border-2 border-blue-500 bg-blue-50 cursor-pointer">
              <input type="radio" name="match_type" value="exact" class="hidden" checked>
              <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-3 bg-gradient-to-br from-blue-100 to-blue-200 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </div>
                <h4 class="font-semibold text-gray-900 mb-1">精确匹配</h4>
                <p class="text-xs text-gray-600">完全匹配搜索词</p>
                <span class="inline-block mt-2 px-2 py-1 bg-blue-500 text-white text-xs rounded">推荐</span>
              </div>
            </label>

            <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300 cursor-pointer">
              <input type="radio" name="match_type" value="phrase" class="hidden">
              <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
                  </svg>
                </div>
                <h4 class="font-semibold text-gray-900 mb-1">短语匹配</h4>
                <p class="text-xs text-gray-600">包含该短语的搜索</p>
              </div>
            </label>

            <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300 cursor-pointer">
              <input type="radio" name="match_type" value="broad" class="hidden">
              <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                  </svg>
                </div>
                <h4 class="font-semibold text-gray-900 mb-1">广泛匹配</h4>
                <p class="text-xs text-gray-600">相关搜索词都匹配</p>
              </div>
            </label>
          </div>
        </div>

        <!-- 出价 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            出价 <span class="text-red-500">*</span>
          </label>
          <div class="flex items-center gap-3">
            <span class="text-gray-600">¥</span>
            <input type="number" class="qc-input flex-1" placeholder="0.00" step="0.01" min="0.5">
            <span class="text-sm text-gray-600 whitespace-nowrap">建议出价: ¥1.50 - ¥3.00</span>
          </div>
          <p class="mt-1 text-xs text-gray-500">出价越高，广告展示机会越大</p>
        </div>

        <!-- 着陆页 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            着陆页 <span class="text-red-500">*</span>
          </label>
          <select class="qc-input">
            <option value="">请选择着陆页</option>
            <option value="live">直播间</option>
            <option value="product">商品详情页</option>
            <option value="shop">店铺首页</option>
          </select>
        </div>

      </div>

      <!-- 预览和提示 -->
      <div class="mt-6 bg-gray-50 border border-gray-200 rounded-lg p-4">
        <h4 class="text-sm font-medium text-gray-900 mb-3">💡 优化建议</h4>
        <ul class="space-y-2 text-sm text-gray-700">
          <li class="flex items-start gap-2">
            <span class="text-green-500 font-bold mt-0.5">✓</span>
            <span>选择<strong>精确匹配</strong>可以提高广告精准度，降低无效点击</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-blue-500 font-bold mt-0.5">ℹ️</span>
            <span>建议出价在市场平均水平以上，提高广告竞争力</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-purple-500 font-bold mt-0.5">⭐</span>
            <span>添加高质量关键词后，系统会在24小时内完成审核</span>
          </li>
        </ul>
      </div>

      <!-- 底部操作按钮 -->
      <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-200">
        <button onclick="window.location.href='keywords.html'" class="qc-btn qc-btn-secondary">
          取消
        </button>
        <div class="flex gap-3">
          <button onclick="addAnother()" class="qc-btn qc-btn-secondary">
            保存并继续添加
          </button>
          <button onclick="submitKeyword()" class="qc-btn qc-btn-primary">
            提交
          </button>
        </div>
      </div>

    </div>

    <!-- 批量添加模式 -->
    <div id="mode-batch" class="qc-card hidden">
      <h3 class="text-xl font-semibold text-gray-900 mb-6">批量添加关键词</h3>

      <div class="space-y-6">
        
        <!-- 选择广告计划 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            选择广告计划 <span class="text-red-500">*</span>
          </label>
          <select class="qc-input">
            <option value="">请选择广告计划</option>
            <option value="1">春季大促-直播推广</option>
            <option value="2">新品推广计划</option>
            <option value="3">品牌宣传计划</option>
          </select>
        </div>

        <!-- 批量关键词输入 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            批量关键词 <span class="text-red-500">*</span>
          </label>
          <textarea class="qc-input" rows="10" placeholder="每行输入一个关键词&#10;例如：&#10;美妆护肤品&#10;口红推荐&#10;护肤精华&#10;面膜补水"></textarea>
          <p class="mt-1 text-xs text-gray-500">每行一个关键词，最多可添加100个</p>
        </div>

        <!-- 统一设置 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              匹配类型 <span class="text-red-500">*</span>
            </label>
            <select class="qc-input">
              <option value="exact">精确匹配</option>
              <option value="phrase">短语匹配</option>
              <option value="broad">广泛匹配</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              统一出价 <span class="text-red-500">*</span>
            </label>
            <div class="flex items-center gap-2">
              <span class="text-gray-600">¥</span>
              <input type="number" class="qc-input flex-1" placeholder="0.00" step="0.01" min="0.5">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              着陆页 <span class="text-red-500">*</span>
            </label>
            <select class="qc-input">
              <option value="">请选择着陆页</option>
              <option value="live">直播间</option>
              <option value="product">商品详情页</option>
              <option value="shop">店铺首页</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              默认状态
            </label>
            <select class="qc-input">
              <option value="active">立即启用</option>
              <option value="paused">创建后暂停</option>
            </select>
          </div>

        </div>

      </div>

      <!-- 批量导入提示 -->
      <div class="mt-6 bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg p-6">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center flex-shrink-0">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
          </div>
          <div class="flex-1">
            <h4 class="text-lg font-semibold text-gray-900 mb-2">📋 支持文件导入</h4>
            <p class="text-sm text-gray-700 mb-3">您可以通过上传Excel或CSV文件批量导入关键词，提高效率</p>
            <div class="flex gap-3">
              <button class="px-4 py-2 bg-white border border-purple-300 text-purple-700 text-sm font-medium rounded-lg hover:bg-purple-50">
                下载模板
              </button>
              <button class="px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 text-white text-sm font-medium rounded-lg hover:shadow-lg transition-shadow">
                上传文件
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 底部操作按钮 -->
      <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-200">
        <button onclick="window.location.href='keywords.html'" class="qc-btn qc-btn-secondary">
          取消
        </button>
        <button onclick="submitBatchKeywords()" class="qc-btn qc-btn-primary">
          批量提交
        </button>
      </div>

    </div>

        </div>
    </div>
  </main>
  </div>

  <script>
    // 模式切换
    function switchMode(mode) {
      const singleBtn = document.getElementById('btn-single');
      const batchBtn = document.getElementById('btn-batch');
      const singleMode = document.getElementById('mode-single');
      const batchMode = document.getElementById('mode-batch');

      if (mode === 'single') {
        singleBtn.className = 'flex-1 py-3 bg-gradient-to-r from-red-500 to-orange-500 text-white font-medium rounded-lg';
        batchBtn.className = 'flex-1 py-3 bg-white border-2 border-gray-200 text-gray-700 font-medium rounded-lg hover:border-gray-300';
        singleMode.classList.remove('hidden');
        batchMode.classList.add('hidden');
      } else {
        batchBtn.className = 'flex-1 py-3 bg-gradient-to-r from-red-500 to-orange-500 text-white font-medium rounded-lg';
        singleBtn.className = 'flex-1 py-3 bg-white border-2 border-gray-200 text-gray-700 font-medium rounded-lg hover:border-gray-300';
        batchMode.classList.remove('hidden');
        singleMode.classList.add('hidden');
      }
    }

    // 匹配类型选择
    document.querySelectorAll('input[name="match_type"]').forEach(radio => {
      radio.addEventListener('change', function() {
        document.querySelectorAll('input[name="match_type"]').forEach(r => {
          const label = r.closest('label');
          label.classList.remove('border-blue-500', 'bg-blue-50');
          label.classList.add('border-gray-200');
        });
        const label = this.closest('label');
        label.classList.remove('border-gray-200');
        label.classList.add('border-blue-500', 'bg-blue-50');
      });
    });

    function saveDraft() {
      alert('草稿已保存！');
    }

    function addAnother() {
      alert('关键词已添加！\n继续添加下一个关键词');
      // 清空表单
    }

    function submitKeyword() {
      alert('关键词提交成功！\n将在24小时内完成审核');
      window.location.href = 'keywords.html';
    }

    function submitBatchKeywords() {
      alert('批量关键词提交成功！\n将在24小时内完成审核');
      window.location.href = 'keywords.html';
    }
  </script>

  <script src="nav-component.js"></script>
</body>
</html>
