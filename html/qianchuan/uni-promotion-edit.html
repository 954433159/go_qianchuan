<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑全域推广 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b">
        <div class="px-6 py-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">编辑全域推广计划</h1>
        </div>
    </header>
    <div class="flex">
        <aside class="w-64 bg-white border-r h-screen sticky top-16 overflow-y-auto">
            <nav id="main-nav"></nav>
        </aside>
        <main class="flex-1 p-8 max-w-4xl">
            <div class="bg-white rounded-xl border p-6 mb-6">
                <h2 class="text-lg font-semibold mb-4">基本信息</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">计划名称</label>
                        <input type="text" value="美妆全域推广-001" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">日预算</label>
                            <input type="number" value="5000" class="w-full px-4 py-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">ROI目标</label>
                            <input type="number" value="300" class="w-full px-4 py-2 border rounded-lg">
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="history.back()" class="btn-secondary">取消</button>
                <button class="btn-primary">保存修改</button>
            </div>
        </main>
    </div>
    <script src="nav-component.js"></script>
</body>
</html>
