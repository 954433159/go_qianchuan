<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创建广告组 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">📁 创建广告组</h2>
      <p class="mt-2 text-gray-600">为您的推广活动创建一个新的广告组</p>
    </div>

    <!-- 步骤指示器 -->
    <div class="mb-8">
      <div class="flex items-center justify-between max-w-2xl mx-auto">
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-full flex items-center justify-center font-bold mb-2">
            1
          </div>
          <span class="text-sm font-medium text-red-600">基础信息</span>
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-4"></div>
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center font-bold mb-2">
            2
          </div>
          <span class="text-sm text-gray-500">预算设置</span>
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-4"></div>
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center font-bold mb-2">
            3
          </div>
          <span class="text-sm text-gray-500">确认提交</span>
        </div>
      </div>
    </div>

    <!-- 表单内容 -->
    <div class="qc-card max-w-3xl mx-auto">
      <h3 class="text-xl font-semibold text-gray-900 mb-6">第一步：基础信息</h3>

      <div class="space-y-6">
        
        <!-- 广告组名称 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            广告组名称 <span class="text-red-500">*</span>
          </label>
          <input type="text" class="qc-input" placeholder="请输入广告组名称，建议包含推广目标" maxlength="50">
          <p class="mt-1 text-xs text-gray-500">最多50个字符，建议使用易于识别的名称</p>
        </div>

        <!-- 推广目标 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-3">
            推广目标 <span class="text-red-500">*</span>
          </label>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <label class="qc-card qc-card-interactive border-2 border-red-500 bg-red-50 cursor-pointer">
              <input type="radio" name="objective" value="live" class="hidden" checked>
              <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-3 bg-gradient-to-br from-red-100 to-orange-100 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </div>
                <h4 class="font-semibold text-gray-900 mb-1">直播推广</h4>
                <p class="text-xs text-gray-600">推广直播间，提升直播GMV</p>
                <span class="inline-block mt-2 px-2 py-1 bg-red-500 text-white text-xs rounded">推荐</span>
              </div>
            </label>

            <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300 cursor-pointer">
              <input type="radio" name="objective" value="product" class="hidden">
              <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                  </svg>
                </div>
                <h4 class="font-semibold text-gray-900 mb-1">商品推广</h4>
                <p class="text-xs text-gray-600">推广商品，提升商品销量</p>
              </div>
            </label>

            <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300 cursor-pointer">
              <input type="radio" name="objective" value="fans" class="hidden">
              <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
                  <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                  </svg>
                </div>
                <h4 class="font-semibold text-gray-900 mb-1">涨粉推广</h4>
                <p class="text-xs text-gray-600">增加账号粉丝数量</p>
              </div>
            </label>
          </div>
        </div>

        <!-- 推广对象 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            选择推广对象 <span class="text-red-500">*</span>
          </label>
          <div class="flex gap-3">
            <select class="qc-input flex-1">
              <option value="">请选择直播间</option>
              <option value="8869457221">美妆旗舰店 (ID: 8869457221)</option>
              <option value="8869457222">时尚生活馆 (ID: 8869457222)</option>
              <option value="8869457223">品质好物店 (ID: 8869457223)</option>
            </select>
            <button class="qc-btn qc-btn-secondary">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
              </svg>
              添加
            </button>
          </div>
          <p class="mt-1 text-xs text-gray-500">已选择 0 个推广对象</p>
        </div>

        <!-- 投放时间 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-3">
            投放时间 <span class="text-red-500">*</span>
          </label>
          <div class="space-y-3">
            <label class="flex items-center p-4 border-2 border-red-500 bg-red-50 rounded-xl cursor-pointer">
              <input type="radio" name="schedule" value="continuous" class="w-4 h-4 text-red-500" checked>
              <div class="ml-3 flex-1">
                <span class="font-medium text-gray-900">长期投放</span>
                <p class="text-xs text-gray-600 mt-1">持续投放直到手动停止或预算用完</p>
              </div>
              <span class="px-2 py-1 bg-red-500 text-white text-xs rounded">推荐</span>
            </label>
            
            <label class="flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-gray-300">
              <input type="radio" name="schedule" value="scheduled" class="w-4 h-4 text-red-500">
              <div class="ml-3 flex-1">
                <span class="font-medium text-gray-900">设置投放时间</span>
                <p class="text-xs text-gray-600 mt-1">指定开始和结束时间</p>
              </div>
            </label>
          </div>
        </div>

        <!-- 时间范围（条件显示） -->
        <div id="time-range" class="hidden">
          <div class="grid grid-cols-2 gap-4 p-4 bg-gray-50 rounded-xl">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">开始时间</label>
              <input type="datetime-local" class="qc-input">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">结束时间</label>
              <input type="datetime-local" class="qc-input">
            </div>
          </div>
        </div>

        <!-- 描述 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            广告组描述 <span class="text-gray-400">(选填)</span>
          </label>
          <textarea class="qc-input" rows="3" placeholder="请输入广告组描述，方便日后管理识别" maxlength="200"></textarea>
          <p class="mt-1 text-xs text-gray-500">最多200个字符</p>
        </div>

      </div>

      <!-- 提示信息 -->
      <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
        <div class="flex items-start">
          <svg class="w-5 h-5 text-blue-500 mr-3 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <div class="text-sm text-blue-700">
            <p class="font-medium mb-1">温馨提示</p>
            <ul class="list-disc list-inside space-y-1 text-xs">
              <li>广告组是管理多个推广计划的容器，建议按推广目标或活动主题创建</li>
              <li>同一广告组下的计划将共享预算和设置</li>
              <li>创建后可随时编辑广告组信息</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- 底部操作按钮 -->
      <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-200">
        <button onclick="window.location.href='campaigns.html'" class="qc-btn qc-btn-secondary">
          取消
        </button>
        <div class="flex gap-3">
          <button onclick="saveDraft()" class="qc-btn qc-btn-secondary">
            保存草稿
          </button>
          <button onclick="nextStep()" class="qc-btn qc-btn-primary">
            下一步：预算设置
            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
          </button>
        </div>
      </div>

    </div>

        </div>
    </div>
  </main>
  </div>

  <script>
    // 投放时间切换
    document.querySelectorAll('input[name="schedule"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const timeRange = document.getElementById('time-range');
        if (this.value === 'scheduled') {
          timeRange.classList.remove('hidden');
        } else {
          timeRange.classList.add('hidden');
        }
      });
    });

    // 推广目标选择
    document.querySelectorAll('input[name="objective"]').forEach(radio => {
      radio.addEventListener('change', function() {
        // 移除所有选中样式
        document.querySelectorAll('input[name="objective"]').forEach(r => {
          const label = r.closest('label');
          label.classList.remove('border-red-500', 'bg-red-50');
          label.classList.add('border-gray-200');
        });
        // 添加选中样式
        const label = this.closest('label');
        label.classList.remove('border-gray-200');
        label.classList.add('border-red-500', 'bg-red-50');
      });
    });

    function saveDraft() {
      alert('草稿已保存！\n您可以随时继续编辑');
    }

    function nextStep() {
      // 简单验证
      const name = document.querySelector('input[placeholder*="广告组名称"]').value;
      if (!name) {
        alert('请输入广告组名称');
        return;
      }
      alert('验证通过！\n将跳转到预算设置页面');
      // 实际应用中这里会跳转到下一步
    }
  </script>

  <script src="nav-component.js"></script>
</body>
</html>
