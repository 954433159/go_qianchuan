<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创建随心推订单 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">⚡ 创建随心推订单</h2>
      <p class="mt-2 text-gray-600">2分钟快速创建推广，简单易用</p>
    </div>

    <!-- 步骤指示器 -->
    <div class="mb-8">
      <div class="flex items-center justify-between max-w-2xl mx-auto">
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-full flex items-center justify-center font-bold mb-2">1</div>
          <span class="text-sm font-medium text-pink-600">选择内容</span>
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-4"></div>
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center font-bold mb-2">2</div>
          <span class="text-sm text-gray-500">推广设置</span>
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-4"></div>
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center font-bold mb-2">3</div>
          <span class="text-sm text-gray-500">确认提交</span>
        </div>
      </div>
    </div>

    <form onsubmit="submitOrder(event)">
      <!-- 推广目标 -->
      <div class="qc-card mb-6">
        <h3 class="text-xl font-semibold text-gray-900 mb-4">选择推广目标</h3>
        <div class="grid md:grid-cols-3 gap-4">
          <label class="qc-card qc-card-interactive border-2 border-pink-500 bg-pink-50">
            <input type="radio" name="goal" value="fans" class="hidden" checked>
            <div class="text-center">
              <div class="w-16 h-16 mx-auto mb-3 bg-gradient-to-br from-pink-100 to-purple-100 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-pink-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
              </div>
              <h4 class="font-semibold text-gray-900 mb-1">涨粉</h4>
              <p class="text-xs text-gray-600">快速增加粉丝数</p>
            </div>
          </label>

          <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300">
            <input type="radio" name="goal" value="product" class="hidden">
            <div class="text-center">
              <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
              </div>
              <h4 class="font-semibold text-gray-900 mb-1">商品推广</h4>
              <p class="text-xs text-gray-600">提升商品销量</p>
            </div>
          </label>

          <label class="qc-card qc-card-interactive border-2 border-gray-200 hover:border-gray-300">
            <input type="radio" name="goal" value="live" class="hidden">
            <div class="text-center">
              <div class="w-16 h-16 mx-auto mb-3 bg-gray-100 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
              </div>
              <h4 class="font-semibold text-gray-900 mb-1">直播推广</h4>
              <p class="text-xs text-gray-600">增加直播观看</p>
            </div>
          </label>
        </div>
      </div>

      <!-- 选择推广内容 -->
      <div class="qc-card mb-6">
        <h3 class="text-xl font-semibold text-gray-900 mb-4">选择要推广的内容</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">推广内容类型</label>
            <div class="grid grid-cols-2 gap-4">
              <label class="flex items-center p-4 border-2 border-purple-500 bg-purple-50 rounded-xl cursor-pointer">
                <input type="radio" name="content-type" value="video" class="w-4 h-4 text-purple-500" checked>
                <div class="ml-3">
                  <span class="font-medium text-gray-900">短视频</span>
                  <p class="text-xs text-gray-600 mt-1">推广已发布的短视频</p>
                </div>
              </label>
              <label class="flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-gray-300">
                <input type="radio" name="content-type" value="live" class="w-4 h-4 text-purple-500">
                <div class="ml-3">
                  <span class="font-medium text-gray-900">直播间</span>
                  <p class="text-xs text-gray-600 mt-1">推广正在进行的直播</p>
                </div>
              </label>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">选择视频</label>
            <select class="qc-input" required>
              <option value="">请选择要推广的视频</option>
              <option value="1">春季穿搭分享 - 显瘦显高搭配技巧 (3.2万播放)</option>
              <option value="2">美妆教程 - 5分钟快速妆容 (5.8万播放)</option>
              <option value="3">好物分享 - 超实用家居神器 (2.1万播放)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 推广设置 -->
      <div class="qc-card mb-6">
        <h3 class="text-xl font-semibold text-gray-900 mb-4">推广设置</h3>
        <div class="space-y-6">
          
          <!-- 预算 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              投放预算 <span class="text-red-500">*</span>
            </label>
            <div class="grid grid-cols-4 gap-3">
              <button type="button" onclick="selectBudget(100)" class="px-4 py-3 border-2 border-purple-500 bg-purple-50 text-purple-600 rounded-lg font-semibold hover:bg-purple-100">
                ¥100
              </button>
              <button type="button" onclick="selectBudget(200)" class="px-4 py-3 border-2 border-gray-300 rounded-lg font-semibold hover:border-gray-400">
                ¥200
              </button>
              <button type="button" onclick="selectBudget(500)" class="px-4 py-3 border-2 border-gray-300 rounded-lg font-semibold hover:border-gray-400">
                ¥500
              </button>
              <button type="button" onclick="selectBudget(1000)" class="px-4 py-3 border-2 border-gray-300 rounded-lg font-semibold hover:border-gray-400">
                ¥1000
              </button>
            </div>
            <div class="mt-3">
              <input type="number" id="custom-budget" class="qc-input" placeholder="或输入自定义金额" min="100" value="100">
            </div>
            <p class="text-xs text-gray-500 mt-2">预估可获得 800-1200 次曝光</p>
          </div>

          <!-- 投放时长 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">投放时长</label>
            <div class="grid grid-cols-3 gap-3">
              <label class="flex items-center p-3 border-2 border-purple-500 bg-purple-50 rounded-lg cursor-pointer">
                <input type="radio" name="duration" value="24" class="w-4 h-4 text-purple-500" checked>
                <span class="ml-2 font-medium">24小时</span>
              </label>
              <label class="flex items-center p-3 border-2 border-gray-300 rounded-lg cursor-pointer hover:border-gray-400">
                <input type="radio" name="duration" value="48" class="w-4 h-4 text-purple-500">
                <span class="ml-2 font-medium">48小时</span>
              </label>
              <label class="flex items-center p-3 border-2 border-gray-300 rounded-lg cursor-pointer hover:border-gray-400">
                <input type="radio" name="duration" value="72" class="w-4 h-4 text-purple-500">
                <span class="ml-2 font-medium">72小时</span>
              </label>
            </div>
          </div>

          <!-- 定向 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">人群定向</label>
            <div class="space-y-3">
              <label class="flex items-center p-4 border-2 border-purple-500 bg-purple-50 rounded-xl cursor-pointer">
                <input type="radio" name="targeting" value="auto" class="w-4 h-4 text-purple-500" checked>
                <div class="ml-3 flex-1">
                  <span class="font-medium text-gray-900">智能定向（推荐）</span>
                  <p class="text-xs text-gray-600 mt-1">系统自动优化，覆盖最匹配的人群</p>
                </div>
                <span class="px-3 py-1 bg-purple-500 text-white text-xs rounded-full">推荐</span>
              </label>
              
              <label class="flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-gray-300">
                <input type="radio" name="targeting" value="custom" class="w-4 h-4 text-purple-500">
                <div class="ml-3 flex-1">
                  <span class="font-medium text-gray-900">自定义定向</span>
                  <p class="text-xs text-gray-600 mt-1">手动设置年龄、性别、地域等</p>
                </div>
              </label>
            </div>
          </div>

        </div>
      </div>

      <!-- 效果预估 -->
      <div class="qc-card mb-6" style="background: linear-gradient(135deg, #FEF2F2 0%, #FFF7ED 100%);">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">📊 效果预估</h3>
        <div class="grid grid-cols-3 gap-4">
          <div class="bg-white rounded-lg p-4">
            <div class="text-xs text-gray-600 mb-1">预估曝光</div>
            <div class="text-2xl font-bold text-blue-600">800-1.2K</div>
          </div>
          <div class="bg-white rounded-lg p-4">
            <div class="text-xs text-gray-600 mb-1">预估涨粉</div>
            <div class="text-2xl font-bold text-pink-600">30-50</div>
          </div>
          <div class="bg-white rounded-lg p-4">
            <div class="text-xs text-gray-600 mb-1">预估互动</div>
            <div class="text-2xl font-bold text-orange-600">60-100</div>
          </div>
        </div>
        <p class="text-xs text-gray-600 mt-4">* 以上数据为预估值，实际效果可能有所差异</p>
      </div>

      <!-- 提交按钮 -->
      <div class="flex gap-3">
        <button type="button" onclick="window.location.href='suixintui.html'" class="flex-1 qc-btn qc-btn-secondary py-3">
          取消
        </button>
        <button type="submit" class="flex-1 qc-btn qc-btn-primary py-3">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          立即推广 (¥100)
        </button>
      </div>
    </form>

        </div>
    </div>
  </main>
  </div>

  <script>
    function selectBudget(amount) {
      // 更新所有预算按钮样式
      document.querySelectorAll('[onclick^="selectBudget"]').forEach(btn => {
        btn.className = 'px-4 py-3 border-2 border-gray-300 rounded-lg font-semibold hover:border-gray-400';
      });
      event.target.className = 'px-4 py-3 border-2 border-purple-500 bg-purple-50 text-purple-600 rounded-lg font-semibold hover:bg-purple-100';
      document.getElementById('custom-budget').value = amount;
      
      // 更新提交按钮金额
      document.querySelector('[type="submit"]').innerHTML = `
        <svg class="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        立即推广 (¥${amount})
      `;
    }

    function saveDraft() {
      alert('草稿已保存');
    }

    function submitOrder(e) {
      e.preventDefault();
      if (confirm('确认提交随心推订单？')) {
        alert('订单创建成功！开始推广中...');
        setTimeout(() => {
          window.location.href = 'suixintui.html';
        }, 1000);
      }
    }

    // 自定义预算输入时更新按钮
    document.getElementById('custom-budget').addEventListener('input', function(e) {
      const amount = e.target.value || 100;
      document.querySelector('[type="submit"]').innerHTML = `
        <svg class="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        立即推广 (¥${amount})
      `;
    });
  </script>

  <script src="nav-component.js"></script>
</body>
</html>
