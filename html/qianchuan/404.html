<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - 巨量千川</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./design-system.css">
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="qc-empty-state max-w-2xl">
      <!-- 404 图标 -->
      <div class="mb-8">
        <svg class="w-64 h-64 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>

      <!-- 错误码 -->
      <div class="mb-6">
        <h1 class="text-8xl font-bold qc-text-gradient">404</h1>
      </div>

      <!-- 错误标题 -->
      <div class="qc-empty-title text-3xl mb-4">
        页面走丢了
      </div>

      <!-- 错误描述 -->
      <div class="qc-empty-description text-base mb-8">
        抱歉，您访问的页面不存在或已被移除。<br>
        请检查 URL 是否正确，或返回首页重新开始。
      </div>

      <!-- 操作按钮 -->
      <div class="flex items-center gap-4 justify-center">
        <button onclick="history.back()" class="qc-btn qc-btn-secondary">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          返回上一页
        </button>
        <a href="./dashboard.html" class="qc-btn qc-btn-primary">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          返回首页
        </a>
      </div>

      <!-- 常用链接 -->
      <div class="mt-12 pt-8 border-t border-gray-200">
        <p class="text-sm text-gray-500 mb-4">您可能想访问：</p>
        <div class="flex flex-wrap gap-3 justify-center">
          <a href="./promotions.html" class="text-sm text-gray-600 hover:text-red-600 transition">推广计划</a>
          <span class="text-gray-300">|</span>
          <a href="./campaigns.html" class="text-sm text-gray-600 hover:text-red-600 transition">广告组</a>
          <span class="text-gray-300">|</span>
          <a href="./creatives.html" class="text-sm text-gray-600 hover:text-red-600 transition">创意管理</a>
          <span class="text-gray-300">|</span>
          <a href="./reports.html" class="text-sm text-gray-600 hover:text-red-600 transition">数据报表</a>
          <span class="text-gray-300">|</span>
          <a href="./tools-center.html" class="text-sm text-gray-600 hover:text-red-600 transition">工具中心</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 记录 404 错误
    console.error('404 Error:', {
      url: window.location.href,
      referrer: document.referrer,
      timestamp: new Date().toISOString()
    });
  </script>
</body>
</html>
