<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随心推兴趣标签 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">

    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">🎯 随心推兴趣标签</h2>
      <p class="mt-2 text-gray-600">选择兴趣标签精准定向目标用户</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 space-y-6">
        <div class="qc-card">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-gray-900">兴趣标签库</h3>
            <input type="text" class="qc-input w-64" placeholder="搜索标签...">
          </div>
          
          <div class="mb-6">
            <div class="flex items-center gap-2 mb-3">
              <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
              <h4 class="font-semibold text-gray-900">热门标签</h4>
            </div>
            <div class="flex flex-wrap gap-2">
              <button class="px-4 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-full text-sm font-medium hover:shadow-lg transition">美妆护肤</button>
              <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-sm font-medium hover:bg-gray-200 transition">服饰穿搭</button>
              <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-sm font-medium hover:bg-gray-200 transition">数码科技</button>
              <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-sm font-medium hover:bg-gray-200 transition">美食探店</button>
              <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-sm font-medium hover:bg-gray-200 transition">母婴育儿</button>
              <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-sm font-medium hover:bg-gray-200 transition">家居生活</button>
            </div>
          </div>

          <div class="space-y-4">
            <div>
              <h4 class="font-semibold text-gray-900 mb-3">🎨 美妆护肤</h4>
              <div class="flex flex-wrap gap-2">
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">口红</button>
                <button class="px-3 py-1.5 border border-red-500 bg-red-50 text-red-600 rounded-lg text-sm">面膜</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">精华液</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">防晒霜</button>
                <button class="px-3 py-1.5 border border-red-500 bg-red-50 text-red-600 rounded-lg text-sm">眼影盘</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">粉底液</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">卸妆水</button>
              </div>
            </div>

            <div>
              <h4 class="font-semibold text-gray-900 mb-3">👗 服饰穿搭</h4>
              <div class="flex flex-wrap gap-2">
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">连衣裙</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">羽绒服</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">牛仔裤</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">运动鞋</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">毛衣</button>
              </div>
            </div>

            <div>
              <h4 class="font-semibold text-gray-900 mb-3">📱 数码科技</h4>
              <div class="flex flex-wrap gap-2">
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">手机</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">耳机</button>
                <button class="px-3 py-1.5 border border-red-500 bg-red-50 text-red-600 rounded-lg text-sm">平板电脑</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">智能手表</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">充电宝</button>
              </div>
            </div>

            <div>
              <h4 class="font-semibold text-gray-900 mb-3">🍜 美食探店</h4>
              <div class="flex flex-wrap gap-2">
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">火锅</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">烧烤</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">甜品</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">咖啡</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:border-red-500 hover:bg-red-50 transition">奶茶</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="space-y-6">
        <div class="qc-card sticky top-20">
          <h3 class="text-lg font-semibold text-gray-900 mb-4">已选标签 (3)</h3>
          <div class="space-y-2 mb-6">
            <div class="flex items-center justify-between p-3 bg-red-50 border border-red-200 rounded-lg">
              <span class="text-sm font-medium text-red-900">面膜</span>
              <button class="text-red-600 hover:text-red-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div class="flex items-center justify-between p-3 bg-red-50 border border-red-200 rounded-lg">
              <span class="text-sm font-medium text-red-900">眼影盘</span>
              <button class="text-red-600 hover:text-red-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div class="flex items-center justify-between p-3 bg-red-50 border border-red-200 rounded-lg">
              <span class="text-sm font-medium text-red-900">平板电脑</span>
              <button class="text-red-600 hover:text-red-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
            <h4 class="font-semibold text-blue-900 mb-2">预估覆盖</h4>
            <div class="text-3xl font-bold text-blue-600 mb-1">128万</div>
            <p class="text-sm text-blue-700">潜在用户数</p>
          </div>

          <button class="qc-btn qc-btn-primary w-full">确认选择</button>
          <button class="qc-btn qc-btn-secondary w-full mt-2">清空所有</button>
        </div>
      </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  <script src="nav-component.js"></script>
</body>
</html>
