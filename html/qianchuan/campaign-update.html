<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑广告组 - 巨量千川</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./design-system.css">
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <div id="qc-header"></div>

  <div class="flex">
    <!-- Sidebar -->
    <div id="qc-sidebar" data-active="ad-management"></div>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 ml-64 mt-16 p-8">
      <!-- Page Header -->
      <div id="qc-page-header"></div>

      <!-- Form Card -->
      <div class="max-w-4xl mx-auto">
        <form id="campaign-form" data-validate-form class="qc-card">
          <div class="space-y-6">
            <!-- 基础信息 -->
            <div>
              <h3 class="text-lg font-semibold text-gray-900 mb-4">基础信息</h3>
              <div class="grid grid-cols-2 gap-6">
                <div>
                  <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                    广告组名称 <span class="text-red-500">*</span>
                  </label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="qc-input"
                    placeholder="请输入广告组名称"
                    data-validate="required|minLength:2|maxLength:50"
                    data-label="广告组名称"
                  >
                </div>

                <div>
                  <label for="budget_mode" class="block text-sm font-medium text-gray-700 mb-2">
                    预算类型 <span class="text-red-500">*</span>
                  </label>
                  <select id="budget_mode" name="budget_mode" class="qc-input" data-validate="required">
                    <option value="">请选择</option>
                    <option value="BUDGET_MODE_DAY">日预算</option>
                    <option value="BUDGET_MODE_TOTAL">总预算</option>
                    <option value="BUDGET_MODE_INFINITE">不限预算</option>
                  </select>
                </div>

                <div id="budget-input-container">
                  <label for="budget" class="block text-sm font-medium text-gray-700 mb-2">
                    预算金额 <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <input
                      type="number"
                      id="budget"
                      name="budget"
                      class="qc-input pr-12"
                      placeholder="请输入预算"
                      step="0.01"
                      data-validate="required|number|min:300"
                      data-label="预算"
                    >
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-500">元</span>
                  </div>
                </div>

                <div>
                  <label for="landing_type" class="block text-sm font-medium text-gray-700 mb-2">
                    推广目的 <span class="text-red-500">*</span>
                  </label>
                  <select id="landing_type" name="landing_type" class="qc-input" data-validate="required">
                    <option value="">请选择</option>
                    <option value="LANDING_TYPE_LINK">落地页</option>
                    <option value="LANDING_TYPE_SHOP">商品</option>
                    <option value="LANDING_TYPE_LIVE">直播间</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 投放设置 -->
            <div class="pt-6 border-t">
              <h3 class="text-lg font-semibold text-gray-900 mb-4">投放设置</h3>
              <div class="space-y-4">
                <div>
                  <label class="flex items-center">
                    <input type="checkbox" name="auto_derive_budget" class="w-4 h-4 text-red-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-700">自动衍生预算（当广告组预算不足时自动调整）</span>
                  </label>
                </div>

                <div>
                  <label class="flex items-center">
                    <input type="checkbox" name="smart_bid_type" class="w-4 h-4 text-red-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-700">启用智能出价</span>
                  </label>
                </div>
              </div>
            </div>

            <!-- 备注 -->
            <div class="pt-6 border-t">
              <label for="operation_remark" class="block text-sm font-medium text-gray-700 mb-2">
                操作备注
              </label>
              <textarea
                id="operation_remark"
                name="operation_remark"
                rows="3"
                class="qc-input"
                placeholder="记录本次修改的原因和内容（可选）"
                data-validate="maxLength:200"
              ></textarea>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex items-center justify-end gap-3 mt-8 pt-6 border-t">
            <button type="button" onclick="history.back()" class="qc-btn qc-btn-secondary">
              取消
            </button>
            <button type="button" onclick="previewChanges()" class="qc-btn qc-btn-ghost">
              预览变更
            </button>
            <button type="submit" class="qc-btn qc-btn-primary">
              保存修改
            </button>
          </div>
        </form>
      </div>

      <!-- 变更预览抽屉 -->
      <div class="qc-drawer-overlay" id="preview-overlay"></div>
      <div class="qc-drawer" id="preview-drawer">
        <div class="qc-drawer-header">
          <h3 class="qc-drawer-title">变更预览</h3>
          <button onclick="closePreview()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="qc-drawer-body" id="preview-content">
          <!-- 动态填充 -->
        </div>
        <div class="qc-drawer-footer">
          <button onclick="closePreview()" class="qc-btn qc-btn-secondary">关闭</button>
          <button onclick="submitForm()" class="qc-btn qc-btn-primary">确认修改</button>
        </div>
      </div>
          </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  </div>
  </div>

  <script src="./assets/js/common.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/validate.js"></script>

  <script>
    // 渲染页面头部
    document.getElementById('qc-page-header').innerHTML = QC.renderPageHeader({
      title: '编辑广告组',
      description: '修改广告组配置',
      breadcrumbs: [
        { label: '投放管理', url: './campaigns.html' },
        { label: '广告组列表', url: './campaigns.html' },
        { label: '编辑广告组' }
      ]
    });

    // 获取广告组 ID
    const urlParams = new URLSearchParams(window.location.search);
    const campaignId = urlParams.get('id');

    // 加载现有数据
    if (campaignId) {
      QC.showLoading('加载数据中...');
      api.get('/campaign/get', { campaign_id: campaignId })
        .then(data => {
          QC.hideLoading();
          // 填充表单
          document.getElementById('name').value = data.name || '';
          document.getElementById('budget_mode').value = data.budget_mode || '';
          document.getElementById('budget').value = data.budget || '';
          document.getElementById('landing_type').value = data.landing_type || '';
          
          // 根据预算类型显示/隐藏预算输入框
          toggleBudgetInput(data.budget_mode);
        })
        .catch(error => {
          QC.hideLoading();
          alert('加载失败：' + error.message);
        });
    }

    // 预算类型变化时
    document.getElementById('budget_mode').addEventListener('change', (e) => {
      toggleBudgetInput(e.target.value);
    });

    function toggleBudgetInput(budgetMode) {
      const budgetContainer = document.getElementById('budget-input-container');
      const budgetInput = document.getElementById('budget');
      
      if (budgetMode === 'BUDGET_MODE_INFINITE') {
        budgetContainer.style.display = 'none';
        budgetInput.removeAttribute('data-validate');
      } else {
        budgetContainer.style.display = 'block';
        budgetInput.setAttribute('data-validate', 'required|number|min:300');
      }
    }

    // 预览变更
    function previewChanges() {
      const formData = new FormData(document.getElementById('campaign-form'));
      const changes = Object.fromEntries(formData.entries());
      
      let html = '<div class="space-y-4">';
      for (const [key, value] of Object.entries(changes)) {
        if (value) {
          html += `
            <div class="flex justify-between py-2 border-b">
              <span class="text-sm text-gray-600">${getFieldLabel(key)}</span>
              <span class="text-sm font-medium text-gray-900">${formatValue(key, value)}</span>
            </div>
          `;
        }
      }
      html += '</div>';
      
      document.getElementById('preview-content').innerHTML = html;
      document.getElementById('preview-overlay').classList.add('active');
      document.getElementById('preview-drawer').classList.add('active');
    }

    function closePreview() {
      document.getElementById('preview-overlay').classList.remove('active');
      document.getElementById('preview-drawer').classList.remove('active');
    }

    function getFieldLabel(key) {
      const labels = {
        name: '广告组名称',
        budget_mode: '预算类型',
        budget: '预算金额',
        landing_type: '推广目的',
        operation_remark: '操作备注'
      };
      return labels[key] || key;
    }

    function formatValue(key, value) {
      if (key === 'budget') return `¥${value}`;
      if (key === 'budget_mode') {
        const modes = {
          'BUDGET_MODE_DAY': '日预算',
          'BUDGET_MODE_TOTAL': '总预算',
          'BUDGET_MODE_INFINITE': '不限预算'
        };
        return modes[value] || value;
      }
      if (key === 'landing_type') {
        const types = {
          'LANDING_TYPE_LINK': '落地页',
          'LANDING_TYPE_SHOP': '商品',
          'LANDING_TYPE_LIVE': '直播间'
        };
        return types[value] || value;
      }
      return value;
    }

    function submitForm() {
      document.getElementById('campaign-form').requestSubmit();
    }

    // 表单提交
    document.getElementById('campaign-form').addEventListener('formValidated', (e) => {
      if (e.detail.isValid) {
        const validator = e.target._validator || new QC_Validate.FormValidator(e.target);
        const formData = validator.getData();
        
        QC.showLoading('保存中...');
        api.post('/campaign/update', {
          campaign_id: campaignId,
          ...formData
        })
          .then(data => {
            QC.hideLoading();
            alert('修改成功');
            setTimeout(() => {
              window.location.href = './campaigns.html';
            }, 1000);
          })
          .catch(error => {
            QC.hideLoading();
            alert('修改失败：' + error.message);
          });
      }
    });
  </script>
  <script src="nav-component.js"></script>
</body>
</html>
