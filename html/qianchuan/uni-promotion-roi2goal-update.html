<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="./design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新全域ROI目标 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="hidden md:block">
                    <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
                </div>
            </div>
        </div>
    </header>
    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
            <nav class="p-4 space-y-6" id="main-nav"></nav>
        </aside>
        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                <h1 class="text-3xl font-bold text-gray-900">更新全域控成本计划ROI目标</h1>
                <p class="text-gray-600">调整支付ROI目标，适用于控成本推广计划</p>
                <div class="bg-white rounded-lg border p-6 space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">选择控成本计划 *</label>
                        <div class="border rounded-lg p-4 max-h-64 overflow-y-auto">
                            <label class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded cursor-pointer">
                                <input type="checkbox" class="rounded text-red-500">
                                <div class="flex-1">
                                    <p class="font-medium">【全域控成本】美妆专场</p>
                                    <p class="text-sm text-gray-500">当前ROI目标: 4.5 | 近7日ROI: 5.2</p>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">新ROI目标 *</label>
                            <input type="number" step="0.1" min="0.5" class="w-full px-4 py-2 border rounded-lg" placeholder="4.5">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">建议ROI范围</label>
                            <div class="px-4 py-2 bg-gray-50 border rounded-lg text-sm text-gray-600">
                                3.5 - 6.0
                            </div>
                        </div>
                    </div>
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                        <h3 class="text-sm font-semibold text-green-900 mb-2">💡 ROI目标建议</h3>
                        <ul class="text-sm text-green-700 space-y-1">
                            <li>• ROI目标过高可能导致曝光不足</li>
                            <li>• 建议根据历史ROI ±20% 设置</li>
                            <li>• 学习期建议设置较低目标</li>
                        </ul>
                    </div>
                    <div class="flex justify-between pt-4 border-t">
                        <button type="button" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-6 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg shadow-sm">更新ROI目标</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="nav-component.js"></script>
</body>
</html>
