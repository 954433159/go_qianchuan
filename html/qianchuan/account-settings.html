<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户设置 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">⚙️ 账户设置</h2>
      <p class="mt-2 text-gray-600">管理您的广告账户信息和配置</p>
    </div>

    <!-- Tab导航 -->
    <div class="qc-card mb-6">
      <div class="flex border-b border-gray-200">
        <button onclick="switchTab('basic')" class="tab-btn active" data-tab="basic">基本信息</button>
        <button onclick="switchTab('auth')" class="tab-btn" data-tab="auth">授权管理</button>
        <button onclick="switchTab('notify')" class="tab-btn" data-tab="notify">通知设置</button>
        <button onclick="switchTab('security')" class="tab-btn" data-tab="security">安全设置</button>
      </div>
    </div>

    <!-- 基本信息Tab -->
    <div id="tab-basic" class="tab-content">
      <div class="qc-card mb-6">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">账户信息</h3>
        <div class="space-y-4">
          <div class="grid grid-cols-3 gap-4 items-center">
            <label class="text-sm font-medium text-gray-700">广告主ID</label>
            <div class="col-span-2 text-gray-900">1234567890123456</div>
          </div>
          <div class="grid grid-cols-3 gap-4 items-center">
            <label class="text-sm font-medium text-gray-700">公司名称</label>
            <input type="text" class="col-span-2 qc-input" value="某某科技有限公司">
          </div>
          <div class="grid grid-cols-3 gap-4 items-center">
            <label class="text-sm font-medium text-gray-700">联系人</label>
            <input type="text" class="col-span-2 qc-input" value="张经理">
          </div>
          <div class="grid grid-cols-3 gap-4 items-center">
            <label class="text-sm font-medium text-gray-700">联系电话</label>
            <input type="tel" class="col-span-2 qc-input" value="138****8888">
          </div>
          <div class="grid grid-cols-3 gap-4 items-center">
            <label class="text-sm font-medium text-gray-700">联系邮箱</label>
            <input type="email" class="col-span-2 qc-input" value="contact@company.com">
          </div>
        </div>
        <div class="mt-6 pt-6 border-t border-gray-200">
          <button class="qc-btn qc-btn-primary">保存修改</button>
        </div>
      </div>

      <div class="qc-card">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">账户状态</h3>
        <div class="grid grid-cols-2 gap-6">
          <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
            <div class="flex items-center gap-3 mb-2">
              <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span class="font-medium text-gray-900">账户状态</span>
            </div>
            <div class="text-green-600 font-semibold">正常</div>
          </div>
          <div class="p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <div class="flex items-center gap-3 mb-2">
              <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span class="font-medium text-gray-900">余额</span>
            </div>
            <div class="text-blue-600 font-semibold">¥125,680</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 授权管理Tab -->
    <div id="tab-auth" class="tab-content hidden">
      <div class="qc-card">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">第三方授权</h3>
        <div class="space-y-3">
          <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                </svg>
              </div>
              <div>
                <div class="font-medium text-gray-900">API应用</div>
                <div class="text-xs text-gray-600">已授权于 2024-01-15</div>
              </div>
            </div>
            <button class="text-red-600 hover:text-red-700 text-sm font-medium">取消授权</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 通知设置Tab -->
    <div id="tab-notify" class="tab-content hidden">
      <div class="qc-card">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">通知偏好</h3>
        <div class="space-y-4">
          <label class="flex items-center justify-between p-4 bg-gray-50 rounded-lg cursor-pointer">
            <div>
              <div class="font-medium text-gray-900">余额不足提醒</div>
              <div class="text-sm text-gray-600">当余额低于设定金额时通知</div>
            </div>
            <input type="checkbox" class="w-5 h-5 text-red-500 rounded" checked>
          </label>
          <label class="flex items-center justify-between p-4 bg-gray-50 rounded-lg cursor-pointer">
            <div>
              <div class="font-medium text-gray-900">广告审核通知</div>
              <div class="text-sm text-gray-600">广告审核结果实时通知</div>
            </div>
            <input type="checkbox" class="w-5 h-5 text-red-500 rounded" checked>
          </label>
          <label class="flex items-center justify-between p-4 bg-gray-50 rounded-lg cursor-pointer">
            <div>
              <div class="font-medium text-gray-900">数据日报</div>
              <div class="text-sm text-gray-600">每日数据汇总邮件</div>
            </div>
            <input type="checkbox" class="w-5 h-5 text-red-500 rounded">
          </label>
        </div>
        <div class="mt-6 pt-6 border-t border-gray-200">
          <button class="qc-btn qc-btn-primary">保存设置</button>
        </div>
      </div>
    </div>

    <!-- 安全设置Tab -->
    <div id="tab-security" class="tab-content hidden">
      <div class="qc-card">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">安全选项</h3>
        <div class="space-y-4">
          <div class="p-4 border border-gray-200 rounded-lg">
            <div class="flex items-center justify-between">
              <div>
                <div class="font-medium text-gray-900">修改密码</div>
                <div class="text-sm text-gray-600">定期更新密码保护账户安全</div>
              </div>
              <button class="qc-btn qc-btn-secondary text-sm">修改</button>
            </div>
          </div>
          <div class="p-4 border border-gray-200 rounded-lg">
            <div class="flex items-center justify-between">
              <div>
                <div class="font-medium text-gray-900">登录日志</div>
                <div class="text-sm text-gray-600">查看最近的登录记录</div>
              </div>
              <button class="qc-btn qc-btn-secondary text-sm">查看</button>
            </div>
          </div>
        </div>
      </div>
    </div>

        </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  </div>

  <script>
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
      document.getElementById(`tab-${tabName}`).classList.remove('hidden');
    }
  </script>

  <style>
    .tab-btn {
      padding: 1rem 1.5rem;
      font-weight: 500;
      color: #6b7280;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: #374151; }
    .tab-btn.active {
      color: #ef4444;
      border-bottom-color: #ef4444;
    }
  </style>

  <script src="nav-component.js"></script>
</body>
</html>
