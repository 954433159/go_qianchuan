<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权处理中 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <!-- Processing Card -->
            <div id="processing-card" class="bg-white rounded-lg border border-gray-200 p-8 text-center">
                <div class="flex justify-center mb-6">
                    <div class="relative">
                        <div class="w-20 h-20 border-4 border-gray-200 rounded-full"></div>
                        <div class="w-20 h-20 border-4 border-red-500 border-t-transparent rounded-full animate-spin absolute top-0 left-0"></div>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">正在处理授权...</h2>
                <p class="text-gray-600 mb-6">请稍候，系统正在验证您的授权信息</p>
                <div class="space-y-2 text-sm text-left bg-gray-50 rounded-lg p-4">
                    <div class="flex items-center gap-2" id="step1">
                        <div class="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                        <span class="text-gray-700">接收授权码</span>
                    </div>
                    <div class="flex items-center gap-2" id="step2">
                        <div class="w-5 h-5 rounded-full border-2 border-gray-300 animate-pulse"></div>
                        <span class="text-gray-500">获取访问令牌</span>
                    </div>
                    <div class="flex items-center gap-2" id="step3">
                        <div class="w-5 h-5 rounded-full border-2 border-gray-300"></div>
                        <span class="text-gray-400">加载账户信息</span>
                    </div>
                </div>
            </div>

            <!-- Success Card -->
            <div id="success-card" class="bg-white rounded-lg border border-green-200 p-8 text-center hidden">
                <div class="flex justify-center mb-6">
                    <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center">
                        <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">授权成功！</h2>
                <p class="text-gray-600 mb-6">您的账户已成功授权，正在跳转...</p>
                <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-sm text-left">
                    <p class="text-green-700 mb-2"><strong>授权账户:</strong> <span id="account-name">-</span></p>
                    <p class="text-green-700"><strong>账户ID:</strong> <span id="account-id">-</span></p>
                </div>
            </div>

            <!-- Error Card -->
            <div id="error-card" class="bg-white rounded-lg border border-red-200 p-8 text-center hidden">
                <div class="flex justify-center mb-6">
                    <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center">
                        <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">授权失败</h2>
                <p class="text-gray-600 mb-4" id="error-message">授权过程中发生错误，请重试</p>
                <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-left mb-6">
                    <p class="text-red-700"><strong>错误代码:</strong> <span id="error-code">-</span></p>
                    <p class="text-red-700 mt-2"><strong>错误详情:</strong> <span id="error-detail">-</span></p>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.location.href='oauth-authorize.html'" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                        返回重试
                    </button>
                    <button onclick="window.location.href='dashboard.html'" class="flex-1 px-4 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg">
                        返回首页
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 解析URL参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                state: params.get('state'),
                error: params.get('error'),
                error_description: params.get('error_description')
            };
        }

        // 模拟授权流程
        async function handleOAuthCallback() {
            const params = getUrlParams();
            
            // 检查是否有错误
            if (params.error) {
                setTimeout(() => showError(params.error, params.error_description), 1000);
                return;
            }

            // 检查必需参数
            if (!params.code) {
                setTimeout(() => showError('missing_code', '缺少授权码参数'), 1000);
                return;
            }

            // 验证state（防CSRF）
            const savedState = sessionStorage.getItem('oauth_state');
            if (savedState && savedState !== params.state) {
                setTimeout(() => showError('invalid_state', 'State参数不匹配，可能存在安全风险'), 1000);
                return;
            }

            try {
                // Step 1: 已完成（接收授权码）
                await sleep(800);
                updateStep(2, 'loading');

                // Step 2: 模拟调用后端获取token
                await sleep(1500);
                const tokenResponse = await mockGetAccessToken(params.code);
                updateStep(2, 'success');
                
                await sleep(500);
                updateStep(3, 'loading');

                // Step 3: 模拟获取账户信息
                await sleep(1200);
                const accountInfo = await mockGetAccountInfo(tokenResponse.access_token);
                updateStep(3, 'success');

                // 存储token
                sessionStorage.setItem('access_token', tokenResponse.access_token);
                sessionStorage.setItem('refresh_token', tokenResponse.refresh_token);
                sessionStorage.setItem('account_info', JSON.stringify(accountInfo));

                // 显示成功
                await sleep(500);
                showSuccess(accountInfo);

                // 3秒后跳转
                setTimeout(() => {
                    window.location.href = 'accounts.html';
                }, 3000);

            } catch (error) {
                showError('api_error', error.message || '系统错误，请稍后重试');
            }
        }

        function updateStep(stepNum, status) {
            const step = document.getElementById(`step${stepNum}`);
            const circle = step.querySelector('div');
            const text = step.querySelector('span');

            if (status === 'loading') {
                circle.className = 'w-5 h-5 rounded-full border-2 border-red-500 animate-pulse';
                text.className = 'text-gray-700';
            } else if (status === 'success') {
                circle.className = 'w-5 h-5 rounded-full bg-green-500 flex items-center justify-center';
                circle.innerHTML = '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>';
                text.className = 'text-gray-700';
            }
        }

        function showSuccess(accountInfo) {
            document.getElementById('processing-card').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');
            document.getElementById('account-name').textContent = accountInfo.name;
            document.getElementById('account-id').textContent = accountInfo.advertiser_id;
        }

        function showError(code, message) {
            document.getElementById('processing-card').classList.add('hidden');
            document.getElementById('error-card').classList.remove('hidden');
            document.getElementById('error-code').textContent = code;
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-detail').textContent = '请检查授权流程是否正确，或联系技术支持';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 模拟API调用
        async function mockGetAccessToken(code) {
            // 实际应用中调用后端API
            // const response = await fetch('/api/oauth/token', { method: 'POST', body: { code } });
            await sleep(1000);
            if (Math.random() > 0.1) { // 90%成功率
                return {
                    access_token: 'mock_access_token_' + Date.now(),
                    refresh_token: 'mock_refresh_token_' + Date.now(),
                    expires_in: 86400
                };
            } else {
                throw new Error('Token获取失败，请重试');
            }
        }

        async function mockGetAccountInfo(token) {
            // 实际应用中调用API获取账户信息
            await sleep(800);
            return {
                advertiser_id: '1234567890123456',
                name: '示例商家账户',
                role: 'advertiser',
                status: 'active'
            };
        }

        // 页面加载时自动执行
        window.addEventListener('DOMContentLoaded', handleOAuthCallback);
    </script>
</body>
</html>
