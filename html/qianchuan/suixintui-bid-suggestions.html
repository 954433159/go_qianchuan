<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随心推建议出价 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">💰 随心推建议出价</h2>
      <p class="mt-2 text-gray-600">获取智能出价建议，优化投放成本</p>
    </div>

    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">基础信息</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-2">广告主ID</label><input type="text" class="qc-input" placeholder="输入广告主ID"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-2">视频ID</label><input type="text" class="qc-input" placeholder="输入视频ID"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-2">推广目标</label><select class="qc-input"><option>直播间推广</option><option>视频推广</option><option>商品推广</option></select></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-2">定向地域</label><select class="qc-input"><option>不限</option><option>北京</option><option>上海</option><option>广州</option></select></div>
      </div>
      <button class="qc-btn qc-btn-primary mt-4">获取建议</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <div class="qc-card bg-gradient-to-br from-green-50 to-emerald-50 border-green-200">
        <div class="flex items-center gap-3 mb-4"><svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><h3 class="text-lg font-semibold text-gray-900">保守出价</h3></div>
        <div class="mb-4"><div class="text-4xl font-bold text-green-600 mb-2">¥0.35</div><p class="text-sm text-gray-600">适合稳健投放</p></div>
        <div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-600">预估曝光</span><span class="font-semibold">12,000</span></div><div class="flex justify-between"><span class="text-gray-600">预估点击</span><span class="font-semibold">360</span></div></div>
      </div>

      <div class="qc-card bg-gradient-to-br from-blue-50 to-cyan-50 border-blue-300 border-2">
        <div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><h3 class="text-lg font-semibold text-gray-900">推荐出价</h3></div><span class="qc-badge qc-badge-info">推荐</span></div>
        <div class="mb-4"><div class="text-5xl font-bold text-blue-600 mb-2">¥0.52</div><p class="text-sm text-gray-600">平衡效果与成本</p></div>
        <div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-600">预估曝光</span><span class="font-semibold">28,500</span></div><div class="flex justify-between"><span class="text-gray-600">预估点击</span><span class="font-semibold">855</span></div></div>
      </div>

      <div class="qc-card bg-gradient-to-br from-orange-50 to-yellow-50 border-orange-200">
        <div class="flex items-center gap-3 mb-4"><svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg><h3 class="text-lg font-semibold text-gray-900">激进出价</h3></div>
        <div class="mb-4"><div class="text-4xl font-bold text-orange-600 mb-2">¥0.78</div><p class="text-sm text-gray-600">最大化曝光</p></div>
        <div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-600">预估曝光</span><span class="font-semibold">52,000</span></div><div class="flex justify-between"><span class="text-gray-600">预估点击</span><span class="font-semibold">1,560</span></div></div>
      </div>
    </div>

    <div class="qc-card">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">出价历史趋势</h3>
      <div class="mb-4"><div class="flex justify-between text-sm text-gray-600 mb-2"><span>近7天平均出价</span><span class="font-semibold text-gray-900">¥0.48</span></div><div class="qc-progress"><div class="qc-progress-bar" style="width: 58%"></div></div></div>
      <div class="grid grid-cols-7 gap-2 mt-6"><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 45%"></div><p class="text-xs text-gray-500 mt-2">周一</p></div><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 52%"></div><p class="text-xs text-gray-500 mt-2">周二</p></div><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 48%"></div><p class="text-xs text-gray-500 mt-2">周三</p></div><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 65%"></div><p class="text-xs text-gray-500 mt-2">周四</p></div><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 58%"></div><p class="text-xs text-gray-500 mt-2">周五</p></div><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 72%"></div><p class="text-xs text-gray-500 mt-2">周六</p></div><div class="text-center"><div class="h-24 bg-gradient-to-t from-blue-500 to-cyan-400 rounded-t" style="height: 68%"></div><p class="text-xs text-gray-500 mt-2">周日</p></div></div>
    </div>
        </div>
    </div>
  </main>
  </div>
  <script src="nav-component.js"></script>
</body>
</html>
