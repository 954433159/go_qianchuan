<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新投放时段 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="px-6 py-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">
                更新投放时段
            </h1>
        </div>
    </header>

    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 h-screen sticky top-16 overflow-y-auto">
            <nav id="main-nav"></nav>
        </aside>

        <main class="flex-1 p-8 max-w-5xl">
            <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">选择推广计划</h2>
                <select id="promotionSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="">请选择要更新的推广计划</option>
                    <option value="1790123456789">美妆新品推广-01 (ID: 1790123456789)</option>
                    <option value="1790123456790">数码产品直播推广 (ID: 1790123456790)</option>
                </select>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold text-gray-900">投放时段设置</h2>
                    <div class="flex gap-2">
                        <button onclick="selectAllTime()" class="px-4 py-2 text-sm bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100">全选</button>
                        <button onclick="clearAllTime()" class="px-4 py-2 text-sm bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-100">清空</button>
                        <button onclick="copyYesterday()" class="px-4 py-2 text-sm bg-orange-50 text-orange-600 rounded-lg hover:bg-orange-100">复制昨日</button>
                    </div>
                </div>

                <!-- 快捷模板 -->
                <div class="grid grid-cols-4 gap-3 mb-6">
                    <button onclick="applyTemplate('worktime')" class="p-3 border-2 border-gray-200 rounded-lg hover:border-orange-500 hover:bg-orange-50 transition">
                        <div class="text-sm font-medium text-gray-900">工作时段</div>
                        <div class="text-xs text-gray-500 mt-1">09:00-18:00</div>
                    </button>
                    <button onclick="applyTemplate('evening')" class="p-3 border-2 border-gray-200 rounded-lg hover:border-orange-500 hover:bg-orange-50 transition">
                        <div class="text-sm font-medium text-gray-900">晚间黄金</div>
                        <div class="text-xs text-gray-500 mt-1">18:00-23:00</div>
                    </button>
                    <button onclick="applyTemplate('allday')" class="p-3 border-2 border-gray-200 rounded-lg hover:border-orange-500 hover:bg-orange-50 transition">
                        <div class="text-sm font-medium text-gray-900">全天投放</div>
                        <div class="text-xs text-gray-500 mt-1">00:00-23:59</div>
                    </button>
                    <button onclick="applyTemplate('peak')" class="p-3 border-2 border-gray-200 rounded-lg hover:border-orange-500 hover:bg-orange-50 transition">
                        <div class="text-sm font-medium text-gray-900">高峰时段</div>
                        <div class="text-xs text-gray-500 mt-1">12:00-14:00, 19:00-22:00</div>
                    </button>
                </div>

                <!-- 时段选择器 -->
                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="grid grid-cols-7 gap-2" id="weekSchedule">
                        <!-- 周一到周日 -->
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周一</div>
                            <div class="space-y-1" id="day-1"></div>
                        </div>
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周二</div>
                            <div class="space-y-1" id="day-2"></div>
                        </div>
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周三</div>
                            <div class="space-y-1" id="day-3"></div>
                        </div>
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周四</div>
                            <div class="space-y-1" id="day-4"></div>
                        </div>
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周五</div>
                            <div class="space-y-1" id="day-5"></div>
                        </div>
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周六</div>
                            <div class="space-y-1" id="day-6"></div>
                        </div>
                        <div class="schedule-day">
                            <div class="text-center font-medium text-sm text-gray-700 mb-2 pb-2 border-b">周日</div>
                            <div class="space-y-1" id="day-0"></div>
                        </div>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div class="mt-6 p-4 bg-blue-50 rounded-lg">
                    <div class="flex items-center gap-4 text-sm">
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
                            </svg>
                            <span class="text-gray-700">已选时段: <span id="selectedCount" class="font-semibold text-blue-600">0</span> 个</span>
                        </div>
                        <div class="text-gray-500">|</div>
                        <div class="text-gray-700">覆盖时长: <span id="totalHours" class="font-semibold text-blue-600">0</span> 小时</div>
                    </div>
                </div>

                <div class="mt-6 flex justify-end gap-3">
                    <button onclick="history.back()" class="btn-secondary">取消</button>
                    <button onclick="submitSchedule()" class="btn-primary">保存时段设置</button>
                </div>
            </div>
        </main>
    </div>

    <script src="nav-component.js"></script>
    <script>
        const scheduleData = {};
        
        // 初始化时段选择器
        function initSchedule() {
            for (let day = 0; day <= 6; day++) {
                const dayId = day === 0 ? 0 : day;
                scheduleData[dayId] = new Array(24).fill(false);
                const container = document.getElementById(`day-${dayId}`);
                
                for (let hour = 0; hour < 24; hour++) {
                    const btn = document.createElement('button');
                    btn.className = 'w-full py-1 text-xs border border-gray-200 rounded hover:border-orange-400 transition';
                    btn.textContent = `${String(hour).padStart(2, '0')}:00`;
                    btn.dataset.day = dayId;
                    btn.dataset.hour = hour;
                    btn.onclick = () => toggleTime(dayId, hour);
                    container.appendChild(btn);
                }
            }
            updateStats();
        }

        function toggleTime(day, hour) {
            scheduleData[day][hour] = !scheduleData[day][hour];
            const btn = document.querySelector(`button[data-day="${day}"][data-hour="${hour}"]`);
            if (scheduleData[day][hour]) {
                btn.classList.add('bg-orange-500', 'text-white', 'border-orange-500');
            } else {
                btn.classList.remove('bg-orange-500', 'text-white', 'border-orange-500');
            }
            updateStats();
        }

        function selectAllTime() {
            for (let day in scheduleData) {
                scheduleData[day] = scheduleData[day].map(() => true);
            }
            updateAllButtons();
        }

        function clearAllTime() {
            for (let day in scheduleData) {
                scheduleData[day] = scheduleData[day].map(() => false);
            }
            updateAllButtons();
        }

        function applyTemplate(template) {
            clearAllTime();
            const templates = {
                worktime: [[9, 18]],
                evening: [[18, 23]],
                allday: [[0, 24]],
                peak: [[12, 14], [19, 22]]
            };
            
            const ranges = templates[template];
            for (let day in scheduleData) {
                ranges.forEach(([start, end]) => {
                    for (let h = start; h < end; h++) {
                        scheduleData[day][h] = true;
                    }
                });
            }
            updateAllButtons();
        }

        function copyYesterday() {
            // 简化版：复制周一的设置到所有天
            const mondaySchedule = scheduleData[1];
            for (let day in scheduleData) {
                scheduleData[day] = [...mondaySchedule];
            }
            updateAllButtons();
        }

        function updateAllButtons() {
            for (let day in scheduleData) {
                for (let hour = 0; hour < 24; hour++) {
                    const btn = document.querySelector(`button[data-day="${day}"][data-hour="${hour}"]`);
                    if (scheduleData[day][hour]) {
                        btn.classList.add('bg-orange-500', 'text-white', 'border-orange-500');
                    } else {
                        btn.classList.remove('bg-orange-500', 'text-white', 'border-orange-500');
                    }
                }
            }
            updateStats();
        }

        function updateStats() {
            let count = 0;
            for (let day in scheduleData) {
                count += scheduleData[day].filter(Boolean).length;
            }
            document.getElementById('selectedCount').textContent = count;
            document.getElementById('totalHours').textContent = count;
        }

        function submitSchedule() {
            const promotionId = document.getElementById('promotionSelect').value;
            if (!promotionId) {
                alert('请先选择推广计划');
                return;
            }

            const selectedSlots = [];
            for (let day in scheduleData) {
                scheduleData[day].forEach((selected, hour) => {
                    if (selected) {
                        selectedSlots.push({ day: parseInt(day), hour });
                    }
                });
            }

            if (selectedSlots.length === 0) {
                alert('请至少选择一个投放时段');
                return;
            }

            console.log('更新计划', promotionId, '时段:', selectedSlots);
            alert(`成功更新 ${selectedSlots.length} 个时段设置`);
        }

        initSchedule();
    </script>

    <style>
        .schedule-day {
            min-width: 80px;
        }
    </style>
</body>
</html>
