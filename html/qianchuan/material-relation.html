<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材关系管理 - 千川直播带货平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="design-system.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="flex h-16 items-center justify-between px-6">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">
              <span class="text-sm font-medium">商</span>
            </div>
            <span class="hidden text-sm font-medium md:inline-block">商家中心</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="qc-card mb-6">
      <h2 class="font-semibold text-gray-900 mb-4">素材使用统计</h2>
      <div class="grid grid-cols-4 gap-6">
        <div class="text-center p-4 bg-blue-50 rounded-lg">
          <div class="text-3xl font-bold text-blue-600">156</div>
          <div class="text-sm text-gray-600 mt-1">总素材数</div>
        </div>
        <div class="text-center p-4 bg-green-50 rounded-lg">
          <div class="text-3xl font-bold text-green-600">89</div>
          <div class="text-sm text-gray-600 mt-1">使用中</div>
        </div>
        <div class="text-center p-4 bg-yellow-50 rounded-lg">
          <div class="text-3xl font-bold text-yellow-600">45</div>
          <div class="text-sm text-gray-600 mt-1">待使用</div>
        </div>
        <div class="text-center p-4 bg-gray-50 rounded-lg">
          <div class="text-3xl font-bold text-gray-600">22</div>
          <div class="text-sm text-gray-600 mt-1">已下线</div>
        </div>
      </div>
    </div>

    <div class="qc-card">
      <h2 class="font-semibold text-gray-900 mb-4">素材关联计划</h2>
      <div class="space-y-3">
        <div class="p-4 border border-gray-200 rounded-lg">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-3">
              <img src="https://placehold.co/60x60/FF6B6B/FFF?text=Video" class="w-12 h-12 rounded">
              <div>
                <h3 class="font-medium text-gray-900">产品展示视频_01.mp4</h3>
                <p class="text-sm text-gray-600">视频素材 • 15秒</p>
              </div>
            </div>
            <span class="qc-badge qc-badge-success">使用中</span>
          </div>
          <div class="text-sm text-gray-600">
            关联计划: <span class="text-blue-600 font-medium">3个广告计划</span>
          </div>
          <div class="flex gap-2 mt-2">
            <span class="px-2 py-1 bg-gray-100 rounded text-xs">计划A</span>
            <span class="px-2 py-1 bg-gray-100 rounded text-xs">计划B</span>
            <span class="px-2 py-1 bg-gray-100 rounded text-xs">计划C</span>
          </div>
        </div>

        <div class="p-4 border border-gray-200 rounded-lg">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-3">
              <img src="https://placehold.co/60x60/4ECDC4/FFF?text=Image" class="w-12 h-12 rounded">
              <div>
                <h3 class="font-medium text-gray-900">产品图_01.jpg</h3>
                <p class="text-sm text-gray-600">图片素材 • 1080x1080</p>
              </div>
            </div>
            <span class="qc-badge qc-badge-success">使用中</span>
          </div>
          <div class="text-sm text-gray-600">
            关联计划: <span class="text-blue-600 font-medium">5个广告计划</span>
          </div>
          <div class="flex gap-2 mt-2">
            <span class="px-2 py-1 bg-gray-100 rounded text-xs">计划D</span>
            <span class="px-2 py-1 bg-gray-100 rounded text-xs">计划E</span>
            <span class="px-2 py-1 bg-gray-100 rounded text-xs">+3个</span>
          </div>
        </div>
      </div>
    </div>
        </div>
    </div>
  </main>
  </div>
  <script src="nav-component.js"></script>
</body>
</html>
