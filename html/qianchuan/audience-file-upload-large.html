<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大文件分片上传 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center px-6"><div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500"><svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></div><div class="ml-3 hidden md:block"><h1 class="text-lg font-bold">千川直播带货</h1></div></div>
    </header>
    <div class="flex">
        <aside class="w-64 bg-white border-r min-h-[calc(100vh-64px)] sticky top-16"><nav class="p-4" id="main-nav"></nav></aside>
        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                <div><h1 class="text-3xl font-bold">大文件分片上传</h1><p class="mt-2 text-gray-600">支持>5MB大文件，自动分片上传，支持断点续传</p></div>
                <div class="bg-white rounded-lg border p-6">
                    <div id="upload-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-red-400 cursor-pointer"><div class="flex flex-col items-center"><div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4"><svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg></div><p class="text-lg font-medium mb-2">点击或拖拽大文件到此处</p><p class="text-sm text-gray-500">支持 CSV, TXT，文件大小 5MB-500MB</p><input type="file" id="file-input" accept=".csv,.txt" class="hidden"></div></div>
                    <div id="file-info" class="mt-4 p-4 bg-gray-50 rounded-lg hidden"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><div><p class="font-medium" id="file-name"></p><p class="text-sm text-gray-500" id="file-size"></p></div></div><button onclick="removeFile()" class="p-2 hover:bg-gray-200 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div></div>
                </div>
                <div id="chunk-progress" class="bg-white rounded-lg border p-6 hidden"><h2 class="text-lg font-semibold mb-4">分片上传进度</h2><div class="space-y-3"><div class="flex justify-between text-sm"><span>总进度</span><span id="total-progress" class="font-medium text-red-600">0/0</span></div><div class="w-full bg-gray-200 rounded-full h-3"><div id="progress-bar" class="h-full bg-gradient-to-r from-red-500 to-orange-500 transition-all" style="width:0%"></div></div><div class="grid grid-cols-2 gap-4 mt-4 text-sm"><div><p class="text-gray-600">已上传</p><p class="text-lg font-semibold" id="uploaded-size">0 MB</p></div><div><p class="text-gray-600">上传速度</p><p class="text-lg font-semibold" id="upload-speed">0 MB/s</p></div></div><div id="chunk-list" class="mt-4 max-h-40 overflow-y-auto border rounded p-2 text-xs"></div></div></div>
                <div class="flex justify-between"><button onclick="window.location.href='audiences.html'" class="px-4 py-2 border rounded-lg">取消</button><button id="start-btn" onclick="startUpload()" class="px-6 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg">开始上传</button></div>
            </div>
        </main>
    </div>
    <script src="nav-component.js"></script>
    <script>
let selectedFile=null;const CHUNK_SIZE=5*1024*1024;document.getElementById('upload-zone').onclick=()=>document.getElementById('file-input').click();document.getElementById('file-input').onchange=(e)=>{if(e.target.files.length>0)handleFile(e.target.files[0])};function handleFile(f){if(!f.name.match(/\.(csv|txt)$/i)){alert('仅支持CSV/TXT');return}if(f.size<5*1024*1024||f.size>500*1024*1024){alert('文件需在5MB-500MB之间');return}selectedFile=f;document.getElementById('file-name').textContent=f.name;document.getElementById('file-size').textContent=(f.size/(1024*1024)).toFixed(2)+' MB';document.getElementById('file-info').classList.remove('hidden')}function removeFile(){selectedFile=null;document.getElementById('file-input').value='';document.getElementById('file-info').classList.add('hidden');document.getElementById('chunk-progress').classList.add('hidden')}async function startUpload(){if(!selectedFile)return;const totalChunks=Math.ceil(selectedFile.size/CHUNK_SIZE);document.getElementById('chunk-progress').classList.remove('hidden');document.getElementById('total-progress').textContent=`0/${totalChunks}`;let uploaded=0;for(let i=0;i<totalChunks;i++){await new Promise(r=>setTimeout(r,200));uploaded++;const percent=(uploaded/totalChunks*100).toFixed(0);document.getElementById('progress-bar').style.width=percent+'%';document.getElementById('total-progress').textContent=`${uploaded}/${totalChunks}`;document.getElementById('uploaded-size').textContent=(uploaded*CHUNK_SIZE/(1024*1024)).toFixed(2)+' MB';document.getElementById('upload-speed').textContent=(Math.random()*3+2).toFixed(2)+' MB/s';document.getElementById('chunk-list').innerHTML+=`<div class="text-green-600">✓ 分片 ${i+1} 上传成功</div>`}alert('上传完成！');window.location.href='audiences.html'}
    </script>
</body>
</html>
