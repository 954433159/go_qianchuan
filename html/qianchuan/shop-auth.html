<!DOCTYPE html>
<html lang="zh-CN">
<head>

<body class="bg-gray-50">

          </svg>
        </div>
        <div class="hidden md:block">
          <h1 class="text-lg font-bold text-gray-900">千川直播带货</h1>
          <p class="text-xs text-gray-500">Qianchuan Live E-commerce</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        </button>
        <div class="relative">
          <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white">

            </div>

  <div class="flex">
    <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
      <nav id="main-nav" class="p-4 space-y-6"></nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto space-y-6">
<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="mb-8">
      <div class="flex items-center text-sm text-gray-500 mb-2">
        <a href="accounts.html" class="hover:text-blue-600">账户管理</a>
        <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-gray-900">店铺新客定向授权</span>
      </div>
      <h2 class="text-3xl font-bold text-gray-900">🏪 店铺新客定向授权</h2>
      <p class="mt-2 text-gray-600">授权店铺新客数据用于精准定向投放</p>
    </div>

    <!-- 说明卡片 -->
    <div class="qc-card mb-6 bg-gradient-to-r from-blue-50 to-indigo-50 border-blue-200">
      <div class="flex items-start gap-4">
        <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="text-lg font-semibold text-gray-900 mb-2">什么是店铺新客定向授权？</h3>
          <p class="text-sm text-gray-700 leading-relaxed mb-3">
            授权后，系统可以使用店铺的新客数据进行精准定向投放，帮助您获取更多新客户。授权数据仅用于广告投放优化，不会用于其他用途。
          </p>
          <ul class="space-y-2 text-sm text-gray-700">
            <li class="flex items-start gap-2">
              <span class="text-blue-500 font-bold mt-0.5">•</span>
              <span>提升新客获取效率，降低获客成本</span>
            </li>
            <li class="flex items-start gap-2">
              <span class="text-blue-500 font-bold mt-0.5">•</span>
              <span>支持排除老客，精准触达潜在新客</span>
            </li>
            <li class="flex items-start gap-2">
              <span class="text-blue-500 font-bold mt-0.5">•</span>
              <span>数据安全加密，符合平台隐私政策</span>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 店铺选择 -->
    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">选择授权店铺</h3>
      
      <div class="space-y-3">
        <!-- 店铺1 -->
        <label class="flex items-center justify-between p-4 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
          <div class="flex items-center gap-4">
            <input type="radio" name="shop" value="shop1" class="w-5 h-5 text-blue-500" checked>
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-500 rounded-lg flex items-center justify-center">
              <span class="text-2xl">🏪</span>
            </div>
            <div>
              <div class="font-semibold text-gray-900">美妆旗舰店</div>
              <div class="text-sm text-gray-600">店铺ID: 123456789</div>
              <div class="text-xs text-gray-500 mt-1">
                <span class="inline-flex items-center px-2 py-0.5 rounded bg-green-100 text-green-700 mr-2">已绑定</span>
                粉丝数: 12.5万
              </div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-sm font-medium text-gray-900">授权状态</div>
            <div class="text-xs text-red-600 mt-1">未授权</div>
          </div>
        </label>

        <!-- 店铺2 -->
        <label class="flex items-center justify-between p-4 border-2 border-gray-200 hover:border-gray-300 rounded-lg cursor-pointer">
          <div class="flex items-center gap-4">
            <input type="radio" name="shop" value="shop2" class="w-5 h-5 text-blue-500">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg flex items-center justify-center">
              <span class="text-2xl">👗</span>
            </div>
            <div>
              <div class="font-semibold text-gray-900">时尚服饰店</div>
              <div class="text-sm text-gray-600">店铺ID: 987654321</div>
              <div class="text-xs text-gray-500 mt-1">
                <span class="inline-flex items-center px-2 py-0.5 rounded bg-green-100 text-green-700 mr-2">已绑定</span>
                粉丝数: 8.6万
              </div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-sm font-medium text-gray-900">授权状态</div>
            <div class="text-xs text-green-600 mt-1">
              <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
              </svg>
              已授权
            </div>
          </div>
        </label>

        <!-- 添加更多店铺 -->
        <button class="w-full p-4 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-colors">
          <div class="flex items-center justify-center gap-2 text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
            <span>添加更多店铺</span>
          </div>
        </button>
      </div>
    </div>

    <!-- 授权配置 -->
    <div class="qc-card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">授权配置</h3>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">数据范围</label>
          <div class="space-y-2">
            <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
              <input type="checkbox" class="w-4 h-4 text-blue-500 rounded mr-3" checked>
              <div class="flex-1">
                <div class="font-medium text-gray-900">店铺成交客户</div>
                <div class="text-xs text-gray-600">授权店铺历史成交客户数据</div>
              </div>
            </label>
            <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
              <input type="checkbox" class="w-4 h-4 text-blue-500 rounded mr-3" checked>
              <div class="flex-1">
                <div class="font-medium text-gray-900">店铺粉丝数据</div>
                <div class="text-xs text-gray-600">授权店铺粉丝画像数据</div>
              </div>
            </label>
            <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
              <input type="checkbox" class="w-4 h-4 text-blue-500 rounded mr-3">
              <div class="flex-1">
                <div class="font-medium text-gray-900">浏览未购客户</div>
                <div class="text-xs text-gray-600">授权浏览商品但未成交的客户数据</div>
              </div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">数据时间范围</label>
          <select class="qc-input">
            <option value="30">最近30天</option>
            <option value="60">最近60天</option>
            <option value="90" selected>最近90天</option>
            <option value="180">最近180天</option>
            <option value="365">最近365天</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">授权有效期</label>
          <select class="qc-input">
            <option value="30">30天</option>
            <option value="90">90天</option>
            <option value="180" selected>180天</option>
            <option value="365">365天</option>
            <option value="0">永久授权</option>
          </select>
          <p class="mt-1 text-xs text-gray-500">授权到期后可重新申请</p>
        </div>
      </div>
    </div>

    <!-- 授权协议 -->
    <div class="qc-card mb-6 border-2 border-yellow-200 bg-yellow-50">
      <div class="flex items-start gap-3">
        <input type="checkbox" id="agree" class="mt-1 w-5 h-5 text-blue-500 rounded">
        <label for="agree" class="flex-1 text-sm text-gray-700 cursor-pointer">
          <span class="font-medium text-gray-900">我已阅读并同意</span>
          <a href="#" class="text-blue-600 hover:underline mx-1">《店铺数据授权协议》</a>和
          <a href="#" class="text-blue-600 hover:underline mx-1">《隐私保护政策》</a>
          <p class="mt-2 text-xs text-gray-600">
            • 授权数据仅用于广告投放优化，不会泄露给第三方<br>
            • 您可以随时撤销授权<br>
            • 授权不影响店铺正常运营
          </p>
        </label>
      </div>
    </div>

    <!-- 底部操作 -->
    <div class="flex items-center justify-between">
      <button onclick="window.location.href='accounts.html'" class="qc-btn qc-btn-secondary">
        取消
      </button>
      <div class="flex gap-3">
        <button class="qc-btn qc-btn-secondary">
          保存草稿
        </button>
        <button onclick="submitAuth()" class="qc-btn qc-btn-primary">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          提交授权申请
        </button>
      </div>
    </div>

        </div>
    </div>
  </main>
  </div>

  <script>
    function submitAuth() {
      const agree = document.getElementById('agree').checked;
      if (!agree) {
        alert('请先阅读并同意授权协议');
        return;
      }
      
      const shop = document.querySelector('input[name="shop"]:checked');
      if (!shop) {
        alert('请选择要授权的店铺');
        return;
      }

      // 显示加载状态
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="animate-spin h-5 w-5 mr-2 inline" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        提交中...
      `;

      setTimeout(() => {
        alert('授权申请已提交！\n\n审核通常在1-2个工作日内完成\n审核结果将通过站内信通知您');
        window.location.href = 'accounts.html';
      }, 1500);
    }
  </script>

  <script src="nav-component.js"></script>
</body>
</html>
