<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="./design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追加订单预算 - 千川直播带货平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200">
        <div class="flex h-16 items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-red-500 to-orange-500">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="hidden md:block"><h1 class="text-lg font-bold text-gray-900">千川直播带货</h1></div>
            </div>
        </div>
    </header>
    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 min-h-[calc(100vh-64px)] sticky top-16">
            <nav class="p-4 space-y-6" id="main-nav"></nav>
        </aside>
        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                <h1 class="text-3xl font-bold text-gray-900">追加随心推订单预算</h1>
                <p class="text-gray-600">为正在投放的订单追加预算，延长投放时间</p>
                <div class="bg-white rounded-lg border p-6 space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">选择订单 *</label>
                        <div class="border rounded-lg p-4 max-h-80 overflow-y-auto space-y-2">
                            <label class="flex items-start gap-3 p-3 hover:bg-gray-50 rounded cursor-pointer border">
                                <input type="radio" name="order" class="mt-1 text-red-500">
                                <div class="flex-1">
                                    <p class="font-medium">冬季新品羽绒服 - 短视频推广</p>
                                    <div class="mt-2 text-sm text-gray-600 space-y-1">
                                        <p>订单ID: 7234567890123456</p>
                                        <p>初始预算: ¥500 | 已消耗: ¥423 | 剩余: ¥77</p>
                                        <p>投放进度: 84.6% | 预计剩余时长: 2小时</p>
                                    </div>
                                    <div class="mt-2 flex items-center gap-2">
                                        <span class="px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded">投放中</span>
                                        <span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded">ROI 5.2</span>
                                    </div>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 p-3 hover:bg-gray-50 rounded cursor-pointer border">
                                <input type="radio" name="order" class="mt-1 text-red-500">
                                <div class="flex-1">
                                    <p class="font-medium">口红套装礼盒 - 短视频推广</p>
                                    <div class="mt-2 text-sm text-gray-600 space-y-1">
                                        <p>订单ID: 7234567890123457</p>
                                        <p>初始预算: ¥800 | 已消耗: ¥645 | 剩余: ¥155</p>
                                        <p>投放进度: 80.6% | 预计剩余时长: 3小时</p>
                                    </div>
                                    <div class="mt-2 flex items-center gap-2">
                                        <span class="px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded">投放中</span>
                                        <span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 text-xs rounded">ROI 3.8</span>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">追加预算金额 (元) *</label>
                            <input type="number" step="0.01" min="50" class="w-full px-4 py-2 border rounded-lg" placeholder="100.00">
                            <p class="mt-1 text-xs text-gray-500">最低追加: ¥50</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">预计延长时长</label>
                            <div class="px-4 py-2 bg-gray-50 border rounded-lg text-gray-600">
                                约 2.5 小时
                            </div>
                        </div>
                    </div>
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                        <h3 class="text-sm font-semibold text-yellow-900 mb-2">⚠️ 追加预算提示</h3>
                        <ul class="text-sm text-yellow-700 space-y-1">
                            <li>• 追加预算后订单将继续投放，无法撤回</li>
                            <li>• 追加后总预算不超过单次投放上限</li>
                            <li>• 建议根据当前ROI决定是否追加</li>
                        </ul>
                    </div>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                        <h3 class="text-sm font-semibold text-blue-900 mb-2">📊 追加效果预估</h3>
                        <div class="grid grid-cols-3 gap-4 text-sm">
                            <div>
                                <p class="text-blue-700">预计新增曝光</p>
                                <p class="text-lg font-semibold text-blue-900 mt-1">+45K</p>
                            </div>
                            <div>
                                <p class="text-blue-700">预计新增转化</p>
                                <p class="text-lg font-semibold text-blue-900 mt-1">+230</p>
                            </div>
                            <div>
                                <p class="text-blue-700">预计ROI</p>
                                <p class="text-lg font-semibold text-green-600 mt-1">5.1</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between pt-4 border-t">
                        <button type="button" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-6 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg shadow-sm">确认追加预算</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="nav-component.js"></script>
</body>
</html>
