version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_ID=${APP_ID}
      - APP_SECRET=${APP_SECRET}
      - PORT=8080
      - GIN_MODE=release
      - CORS_ORIGIN=http://localhost:3000
      - COOKIE_SECRET=${COOKIE_SECRET:-your-secret-key-change-in-production}
      - COOKIE_DOMAIN=localhost
      - COOKIE_SECURE=false
      - SESSION_NAME=qianchuan_session
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 注入前端构建时环境变量
        - VITE_API_BASE_URL=http://backend:8080/api
        - VITE_OAUTH_APP_ID=${VITE_OAUTH_APP_ID:-1846842779198378}
        - VITE_OAUTH_REDIRECT_URI=http://localhost:3000/auth/callback
        - VITE_APP_TITLE=千川SDK管理平台
        - VITE_APP_VERSION=1.0.0
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  default:
    name: qianchuan_network
