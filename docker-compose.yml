version: '3.8'

# 开发环境 Docker Compose 配置
# 使用方法: docker-compose up -d
#
# 注意: 服务名必须与 nginx.conf 中的 upstream 保持一致

services:
  qianchuan-backend:
    build:
      # 从项目根目录构建，以便访问 oceanengineSDK
      context: .
      dockerfile: backend/Dockerfile
    container_name: qianchuan-backend
    expose:
      - "8080"
    volumes:
      # 挂载 .env 配置文件
      - ./backend/.env:/app/.env:ro
    environment:
      - PORT=8080
      - GIN_MODE=release
    restart: unless-stopped
    networks:
      - qianchuan-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  qianchuan-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qianchuan-frontend
    ports:
      # 开发环境使用 3000 端口
      - "3000:80"
    volumes:
      # 使用统一的 nginx 配置（含 API 代理）
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      qianchuan-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qianchuan-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  qianchuan-network:
    driver: bridge
